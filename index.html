<!DOCTYPE html>
<html lang="ko">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>과학실험실 교사 승인 시스템</title>

  <!-- PWA -->
  <meta name="theme-color" content="#1565c0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="실험실 승인">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="실험실 승인">
  <link rel="manifest" href="?page=manifest">
  <link rel="apple-touch-icon" href="https://fonts.gstatic.com/s/i/short-term/release/googlesymbols/science/default/48px.svg">
  <style>
/* ── 리셋 & 변수 ─────────────────────────── */
:root {
  --primary:   #1565c0;
  --primary-l: #e3f2fd;
  --primary-d: #0d47a1;
  --success:   #2e7d32;
  --success-l: #e8f5e9;
  --warning:   #f57f17;
  --warning-l: #fff8e1;
  --danger:    #c62828;
  --danger-l:  #ffebee;
  --info:      #6a1b9a;
  --info-l:    #f3e5f5;
  --bg:        #f4f6f9;
  --card:      #ffffff;
  --text:      #1a1a2e;
  --text-s:    #666;
  --border:    #e2e8f0;
  --shadow:    0 2px 12px rgba(0,0,0,.06);
  --radius:    12px;
  --radius-sm: 8px;
  --font:      'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size:15px; }
body {
  font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh;
  padding-top: env(safe-area-inset-top); /* iOS 노치 대응 */
  -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent;
}
a { color:var(--primary); text-decoration:none; }
button { cursor:pointer; font-family:inherit; border:none; background:none; }

/* ── 스크린 전환 ──────────────────────────── */
.screen { display:none; }
.screen.active { display:block; }

/* ── 로딩 스플래시 ────────────────────────── */
#splash {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:100vh; gap:20px;
}
.splash-spinner {
  width:48px; height:48px; border:4px solid var(--border);
  border-top-color:var(--primary); border-radius:50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.splash-text { color:var(--text-s); font-size:.95rem; }

/* ── 로그인 ───────────────────────────────── */
#login-screen {
  display:flex; align-items:center; justify-content:center; min-height:100vh;
  background:linear-gradient(135deg,#e3f2fd 0%,#f4f6f9 50%,#e8f5e9 100%);
  padding:24px;
}
.login-card {
  background:var(--card); border-radius:20px; box-shadow:0 8px 40px rgba(0,0,0,.1);
  padding:48px 40px; max-width:420px; width:100%; text-align:center;
}
.login-icon {
  width:72px; height:72px; background:var(--primary-l); border-radius:50%;
  display:flex; align-items:center; justify-content:center; margin:0 auto 20px;
  font-size:32px;
}
.login-card h1 { font-size:1.5rem; color:var(--primary-d); margin-bottom:6px; }
.login-card .sub { font-size:.85rem; color:var(--text-s); margin-bottom:32px; }
.login-select-wrap {
  position:relative; margin-bottom:20px;
}
.login-select-wrap select {
  width:100%; padding:14px 16px; border:2px solid var(--border); border-radius:var(--radius-sm);
  font-size:1rem; appearance:none; background:var(--card);
  transition:border-color .2s;
}
.login-select-wrap select:focus { border-color:var(--primary); outline:none; }
.login-select-wrap::after {
  content:''; position:absolute; right:16px; top:50%; transform:translateY(-50%);
  border:6px solid transparent; border-top-color:var(--text-s); pointer-events:none;
}
.login-btn {
  width:100%; padding:14px; background:linear-gradient(135deg,var(--primary),#42a5f5);
  color:#fff; border-radius:var(--radius-sm); font-size:1.05rem; font-weight:700;
  transition:opacity .2s, transform .1s;
}
.login-btn:hover { opacity:.92; }
.login-btn:active { transform:scale(.98); }
.login-btn:disabled { opacity:.5; cursor:not-allowed; }
.login-error {
  margin-top:16px; padding:12px; background:var(--danger-l); color:var(--danger);
  border-radius:var(--radius-sm); font-size:.85rem; display:none;
}
.login-auto-msg {
  margin-top:20px; padding:14px; background:var(--primary-l); border-radius:var(--radius-sm);
  font-size:.85rem; color:var(--primary-d); display:none;
}

/* ── 메인 레이아웃 ────────────────────────── */
.top-bar {
  background:var(--card); border-bottom:1px solid var(--border);
  padding:12px 24px; display:flex; align-items:center; gap:16px;
  position:sticky; top:0; z-index:100; box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.top-bar .logo { font-size:1.1rem; font-weight:800; color:var(--primary-d); white-space:nowrap; }
.top-bar .logo span { font-weight:400; color:var(--text-s); font-size:.85rem; margin-left:8px; }
.top-bar .spacer { flex:1; }
.user-chip {
  display:flex; align-items:center; gap:8px; background:var(--primary-l);
  padding:6px 14px; border-radius:20px; font-size:.85rem; color:var(--primary-d); font-weight:600;
}
.user-chip .avatar {
  width:28px; height:28px; border-radius:50%; background:var(--primary);
  color:#fff; display:flex; align-items:center; justify-content:center;
  font-size:.75rem; font-weight:700;
}
.logout-btn {
  padding:6px 14px; border:1px solid var(--border); border-radius:20px;
  font-size:.8rem; color:var(--text-s); transition:all .2s;
}
.logout-btn:hover { background:var(--danger-l); color:var(--danger); border-color:var(--danger); }

.main-content { max-width:1100px; margin:0 auto; padding:24px; }

/* ── 통계 카드 ────────────────────────────── */
.stats-row {
  display:grid; grid-template-columns:repeat(auto-fit, minmax(150px,1fr));
  gap:16px; margin-bottom:28px;
}
.stat-card {
  background:var(--card); border-radius:var(--radius); padding:20px;
  box-shadow:var(--shadow); display:flex; flex-direction:column; gap:8px;
  transition:transform .15s; cursor:pointer; border-left:4px solid transparent;
}
.stat-card:hover { transform:translateY(-2px); }
.stat-card .stat-label { font-size:.8rem; color:var(--text-s); font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
.stat-card .stat-value { font-size:1.8rem; font-weight:800; }
.stat-card.pending   { border-left-color:var(--warning); }
.stat-card.pending .stat-value { color:var(--warning); }
.stat-card.approved  { border-left-color:var(--success); }
.stat-card.approved .stat-value { color:var(--success); }
.stat-card.rejected  { border-left-color:var(--danger); }
.stat-card.rejected .stat-value { color:var(--danger); }
.stat-card.final     { border-left-color:var(--info); }
.stat-card.final .stat-value { color:var(--info); }

/* ── 섹션 토글 ────────────────────────────── */
.section-toggle {
  display:flex; gap:0; margin-bottom:6px; background:var(--card);
  border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow);
}
.section-btn {
  flex:1; padding:14px 8px; font-size:.9rem; font-weight:600;
  color:var(--text-s); transition:all .2s; text-align:center;
  border-bottom:3px solid transparent;
}
.section-btn:hover { background:var(--primary-l); }
.section-btn.active { color:var(--primary); border-bottom-color:var(--primary); background:var(--primary-l); }

/* ── 탭 바 ────────────────────────────────── */
.tab-bar {
  display:flex; gap:8px; margin:16px 0; flex-wrap:wrap;
}
.tab-pill {
  padding:8px 18px; border-radius:20px; font-size:.82rem; font-weight:600;
  color:var(--text-s); background:var(--card); border:1px solid var(--border);
  transition:all .2s;
}
.tab-pill:hover { border-color:var(--primary); color:var(--primary); }
.tab-pill.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.tab-pill .badge {
  display:inline-block; min-width:20px; padding:1px 7px; border-radius:10px;
  font-size:.72rem; margin-left:6px; background:rgba(255,255,255,.3); font-weight:700;
}
.tab-pill.active .badge { background:rgba(255,255,255,.3); }
.tab-pill:not(.active) .badge { background:var(--border); }

/* ── 신청 카드 리스트 ─────────────────────── */
.app-list { display:flex; flex-direction:column; gap:12px; }
.app-card {
  background:var(--card); border-radius:var(--radius); padding:20px;
  box-shadow:var(--shadow); display:flex; align-items:center; gap:16px;
  transition:all .2s; cursor:pointer; border-left:4px solid var(--border);
}
.app-card:hover { box-shadow:0 4px 20px rgba(0,0,0,.1); transform:translateX(4px); }
.app-card.status-대기     { border-left-color:var(--warning); }
.app-card.status-1차승인  { border-left-color:var(--primary); }
.app-card.status-최종승인 { border-left-color:var(--success); }
.app-card.status-반려     { border-left-color:var(--danger); }

.app-card .card-main { flex:1; min-width:0; }
.app-card .card-top { display:flex; align-items:center; gap:8px; margin-bottom:6px; flex-wrap:wrap; }
.app-card .card-title { font-size:1rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.app-card .card-meta { font-size:.8rem; color:var(--text-s); display:flex; gap:12px; flex-wrap:wrap; }
.app-card .card-meta span { white-space:nowrap; }
.status-badge {
  display:inline-block; padding:3px 10px; border-radius:12px;
  font-size:.72rem; font-weight:700; white-space:nowrap;
}
.status-badge.대기     { background:var(--warning-l); color:var(--warning); }
.status-badge.\\31 차승인 { background:var(--primary-l); color:var(--primary); }
.status-badge.최종승인 { background:var(--success-l); color:var(--success); }
.status-badge.반려     { background:var(--danger-l); color:var(--danger); }

.app-card .card-actions { display:flex; gap:8px; flex-shrink:0; }
.btn-approve, .btn-reject {
  padding:8px 16px; border-radius:var(--radius-sm); font-size:.82rem; font-weight:700;
  transition:all .15s;
}
.btn-approve { background:var(--success-l); color:var(--success); }
.btn-approve:hover { background:var(--success); color:#fff; }
.btn-reject { background:var(--danger-l); color:var(--danger); }
.btn-reject:hover { background:var(--danger); color:#fff; }

.empty-state {
  text-align:center; padding:60px 20px; color:var(--text-s);
}
.empty-state .empty-icon { font-size:48px; margin-bottom:12px; }
.empty-state .empty-msg { font-size:1rem; }

.list-loading {
  text-align:center; padding:40px;
}
.list-loading .spinner-sm {
  width:32px; height:32px; border:3px solid var(--border);
  border-top-color:var(--primary); border-radius:50%;
  animation:spin .8s linear infinite; margin:0 auto 12px;
}

/* ── 상세 모달 ────────────────────────────── */
.modal-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.45);
  z-index:1000; align-items:center; justify-content:center; padding:20px;
  animation:fadeIn .2s ease;
}
.modal-overlay.show { display:flex; }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes slideUp { from { transform:translateY(20px); opacity:0; } to { transform:translateY(0); opacity:1; } }

.modal {
  background:var(--card); border-radius:16px; max-width:640px; width:100%;
  max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.2);
  animation:slideUp .25s ease;
}
.modal-header {
  position:sticky; top:0; background:var(--primary); color:#fff;
  padding:20px 24px; border-radius:16px 16px 0 0;
  display:flex; align-items:center; justify-content:space-between; z-index:10;
}
.modal-header h2 { font-size:1.15rem; font-weight:700; }
.modal-close {
  width:32px; height:32px; border-radius:50%; background:rgba(255,255,255,.2);
  color:#fff; font-size:1.2rem; display:flex; align-items:center; justify-content:center;
  transition:background .2s;
}
.modal-close:hover { background:rgba(255,255,255,.35); }
.modal-body { padding:24px; }

.detail-section { margin-bottom:24px; }
.detail-section h3 {
  font-size:.85rem; color:var(--primary); font-weight:700; text-transform:uppercase;
  letter-spacing:.5px; margin-bottom:12px; padding-bottom:8px; border-bottom:2px solid var(--primary-l);
}
.detail-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:12px;
}
.detail-item { }
.detail-item .label { font-size:.75rem; color:var(--text-s); margin-bottom:2px; font-weight:600; }
.detail-item .value { font-size:.95rem; font-weight:500; word-break:break-word; }
.detail-item.full { grid-column:1/-1; }
.detail-item .value.long {
  background:var(--bg); padding:10px 14px; border-radius:var(--radius-sm);
  font-size:.88rem; line-height:1.6; white-space:pre-wrap; max-height:150px; overflow-y:auto;
}

/* 승인 상태 타임라인 */
.timeline {
  display:flex; flex-direction:column; gap:0; position:relative;
  padding-left:24px;
}
.timeline::before {
  content:''; position:absolute; left:7px; top:4px; bottom:4px;
  width:2px; background:var(--border);
}
.timeline-item {
  position:relative; padding:8px 0 16px;
}
.timeline-item::before {
  content:''; position:absolute; left:-20px; top:10px;
  width:12px; height:12px; border-radius:50%; background:var(--border);
  border:2px solid var(--card);
}
.timeline-item.done::before { background:var(--success); }
.timeline-item.rejected::before { background:var(--danger); }
.timeline-item.pending::before { background:var(--warning); border:2px solid var(--warning-l); }
.timeline-item .tl-title { font-size:.85rem; font-weight:700; }
.timeline-item .tl-detail { font-size:.8rem; color:var(--text-s); margin-top:2px; }

/* ── 승인/반려 액션 영역 ──────────────────── */
.action-area {
  background:var(--bg); border-radius:var(--radius); padding:20px; margin-top:8px;
}
.action-area h3 {
  font-size:.9rem; font-weight:700; margin-bottom:12px; color:var(--text);
}
.action-btns { display:flex; gap:12px; margin-bottom:16px; }
.action-btn {
  flex:1; padding:12px; border-radius:var(--radius-sm); font-size:.95rem; font-weight:700;
  transition:all .2s; border:2px solid transparent;
}
.action-btn.approve { background:var(--success-l); color:var(--success); border-color:var(--success); }
.action-btn.approve:hover, .action-btn.approve.selected { background:var(--success); color:#fff; }
.action-btn.reject { background:var(--danger-l); color:var(--danger); border-color:var(--danger); }
.action-btn.reject:hover, .action-btn.reject.selected { background:var(--danger); color:#fff; }

.comment-wrap { margin-bottom:16px; display:none; }
.comment-wrap.show { display:block; }
.comment-wrap label { font-size:.82rem; font-weight:600; color:var(--text-s); display:block; margin-bottom:6px; }
.comment-wrap textarea {
  width:100%; padding:12px; border:2px solid var(--border); border-radius:var(--radius-sm);
  font-size:.9rem; font-family:inherit; resize:vertical; min-height:80px;
  transition:border-color .2s;
}
.comment-wrap textarea:focus { border-color:var(--primary); outline:none; }
.submit-btn {
  width:100%; padding:14px; border-radius:var(--radius-sm); font-size:1rem; font-weight:700;
  color:#fff; background:var(--primary); transition:all .2s;
}
.submit-btn:hover { background:var(--primary-d); }
.submit-btn:disabled { opacity:.5; cursor:not-allowed; }

/* ── 토스트 ───────────────────────────────── */
.toast-container {
  position:fixed; bottom:24px; right:24px; z-index:9999;
  display:flex; flex-direction:column; gap:8px;
}
.toast {
  padding:14px 20px; border-radius:var(--radius-sm); color:#fff;
  font-size:.9rem; font-weight:600; box-shadow:0 4px 16px rgba(0,0,0,.2);
  animation:slideIn .3s ease; min-width:280px;
}
.toast.success { background:var(--success); }
.toast.error   { background:var(--danger); }
.toast.info    { background:var(--primary); }
@keyframes slideIn { from { transform:translateX(40px); opacity:0; } }

/* ── 반응형 ───────────────────────────────── */
@media (max-width:768px) {
  html { font-size:14px; }
  .top-bar { padding:10px 16px; }
  .top-bar .logo span { display:none; }
  .main-content { padding:16px; }
  .stats-row { grid-template-columns:repeat(2,1fr); gap:10px; }
  .stat-card { padding:14px; }
  .stat-card .stat-value { font-size:1.4rem; }
  .app-card { flex-direction:column; align-items:stretch; gap:12px; }
  .app-card .card-actions { justify-content:flex-end; }
  .detail-grid { grid-template-columns:1fr; }
  .login-card { padding:32px 24px; }
  .action-btns { flex-direction:column; }
  .section-btn { font-size:.8rem; padding:12px 4px; }
  .modal { max-height:95vh; margin:8px; }
}

@media (max-width:380px) {
  .stats-row { grid-template-columns:1fr; }
  .tab-bar { gap:6px; }
  .tab-pill { padding:6px 12px; font-size:.78rem; }
}
  </style>
</head>
<body>

<!-- ====== 스플래시 ====== -->
<div id="splash" class="screen active">
  <div class="splash-spinner"></div>
  <div class="splash-text" id="splash-text">인증 정보를 확인하고 있습니다...</div>
  <button id="splash-skip" style="display:none;margin-top:24px;padding:12px 28px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;" onclick="forceShowLogin()">직접 로그인하기</button>
  <div id="splash-debug" style="margin-top:16px;font-size:.75rem;color:#999;max-width:400px;text-align:center;word-break:break-all;"></div>
</div>

<!-- ====== 로그인 ====== -->
<div id="login-screen" class="screen">
  <div class="login-card">
    <div class="login-icon">&#128300;</div>
    <h1>교사 승인 시스템</h1>
    <p class="sub">과학 실험·실습실 사용 신청 승인</p>

    <div class="login-auto-msg" id="login-auto-msg"></div>

    <div class="login-select-wrap">
      <select id="teacher-select">
        <option value="">교사를 선택해 주세요</option>
      </select>
    </div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ====== 메인 앱 ====== -->
<div id="app-screen" class="screen">

  <!-- 상단 바 -->
  <div class="top-bar">
    <div class="logo">&#128300; 승인 시스템 <span>과학실험실</span></div>
    <div class="spacer"></div>
    <div class="user-chip" id="user-chip">
      <div class="avatar" id="user-avatar">T</div>
      <span id="user-name-display">교사</span>
    </div>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>

  <div class="main-content">

    <!-- 통계 카드 -->
    <div class="stats-row" id="stats-row">
      <div class="stat-card pending" onclick="goTab('guidance','my_pending')">
        <div class="stat-label">내 승인 대기</div>
        <div class="stat-value" id="st-my-pending">-</div>
      </div>
      <div class="stat-card approved" onclick="goTab('guidance','my_approved')">
        <div class="stat-label">승인 완료</div>
        <div class="stat-value" id="st-my-approved">-</div>
      </div>
      <div class="stat-card rejected" onclick="goTab('guidance','my_rejected')">
        <div class="stat-label">반려</div>
        <div class="stat-value" id="st-my-rejected">-</div>
      </div>
      <div class="stat-card final" id="st-final-card" onclick="goTab('final','final_pending')">
        <div class="stat-label">최종 승인 대기</div>
        <div class="stat-value" id="st-final-pending">-</div>
      </div>
    </div>

    <!-- 섹션 토글 (지도교사 / 최종승인) -->
    <div class="section-toggle">
      <button class="section-btn active" data-section="guidance" onclick="switchSection('guidance')">
        &#128218; 지도교사 승인
      </button>
      <button class="section-btn" data-section="final" onclick="switchSection('final')" id="final-section-btn">
        &#128272; 최종 승인
      </button>
    </div>

    <!-- 지도교사 탭 -->
    <div id="guidance-tabs" class="tab-bar">
      <button class="tab-pill active" data-filter="my_pending" onclick="switchTab(this,'guidance')">
        승인 대기 <span class="badge" id="tb-my-pending">0</span>
      </button>
      <button class="tab-pill" data-filter="my_approved" onclick="switchTab(this,'guidance')">
        승인 완료 <span class="badge" id="tb-my-approved">0</span>
      </button>
      <button class="tab-pill" data-filter="my_rejected" onclick="switchTab(this,'guidance')">
        반려 <span class="badge" id="tb-my-rejected">0</span>
      </button>
      <button class="tab-pill" data-filter="my_all" onclick="switchTab(this,'guidance')">
        전체
      </button>
    </div>

    <!-- 최종승인 탭 -->
    <div id="final-tabs" class="tab-bar" style="display:none">
      <button class="tab-pill active" data-filter="final_pending" onclick="switchTab(this,'final')">
        승인 대기 <span class="badge" id="tb-final-pending">0</span>
      </button>
      <button class="tab-pill" data-filter="final_approved" onclick="switchTab(this,'final')">
        승인 완료 <span class="badge" id="tb-final-approved">0</span>
      </button>
      <button class="tab-pill" data-filter="final_rejected" onclick="switchTab(this,'final')">
        반려 <span class="badge" id="tb-final-rejected">0</span>
      </button>
      <button class="tab-pill" data-filter="final_all" onclick="switchTab(this,'final')">
        전체
      </button>
    </div>

    <!-- 목록 -->
    <div id="app-list" class="app-list"></div>

  </div>
</div>

<!-- ====== 상세 모달 ====== -->
<div class="modal-overlay" id="detail-overlay" onclick="if(event.target===this)closeDetail()">
  <div class="modal" id="detail-modal">
    <div class="modal-header">
      <h2 id="modal-title">신청 상세</h2>
      <button class="modal-close" onclick="closeDetail()">&times;</button>
    </div>
    <div class="modal-body" id="modal-body">
      <!-- 동적 -->
    </div>
  </div>
</div>

<!-- ====== 토스트 ====== -->
<div class="toast-container" id="toast-container"></div>

<script>
/* ================================================================
   전역 상태
   ================================================================ */
var USER = null;            // { name, email, subject, isFinalApprover }
var CURRENT_SECTION = 'guidance';
var CURRENT_FILTER  = 'my_pending';
var CACHED_STATS    = null;
var DETAIL_DATA     = null; // 현재 열린 상세 데이터

/* ================================================================
   초기화
   ================================================================ */
window.addEventListener('DOMContentLoaded', function() {
  var authDone = false;
  var dbg = document.getElementById('splash-debug');
  var skipBtn = document.getElementById('splash-skip');

  function dbgLog(msg) {
    console.log(msg);
    if (dbg) dbg.textContent = msg;
  }

  // 3초 후 스킵 버튼 표시
  setTimeout(function() {
    if (skipBtn && !authDone) skipBtn.style.display = 'inline-block';
  }, 3000);

  // 10초 타임아웃 — 강제 로그인 화면
  var authTimeout = setTimeout(function() {
    if (!authDone) {
      authDone = true;
      dbgLog('[타임아웃] 강제 로그인 화면 전환');
      forceShowLogin();
    }
  }, 10000);

  dbgLog('서버에 인증 요청 중...');

  // 자동 로그인 시도
  try {
    google.script.run
      .withSuccessHandler(function(res) {
        if (authDone) return;
        authDone = true;
        clearTimeout(authTimeout);
        dbgLog('응답 수신: loggedIn=' + (res && res.loggedIn) + ', name=' + (res && res.name));
        if (res && res.loggedIn) {
          USER = res;
          enterApp();
        } else {
          if (res && res.reason === 'not_teacher') {
            showAutoMsg('Google 계정(' + (res.email || '') + ')이 교사 목록에 없습니다. 아래에서 직접 선택해 주세요.');
          } else if (res && res.reason === 'error') {
            showAutoMsg('자동 로그인 실패: ' + (res.message || '') + ' — 아래에서 직접 선택해 주세요.');
          }
          loadTeacherSelect();
        }
      })
      .withFailureHandler(function(err) {
        if (authDone) return;
        authDone = true;
        clearTimeout(authTimeout);
        dbgLog('인증 실패: ' + (err && (err.message || err)));
        forceShowLogin();
      })
      .getCurrentUser();
  } catch (e) {
    if (!authDone) {
      authDone = true;
      clearTimeout(authTimeout);
      dbgLog('예외: ' + (e.message || e));
      forceShowLogin();
    }
  }
});

function loadTeacherSelect() {
  var selectDone = false;
  var selectTimeout = setTimeout(function() {
    if (!selectDone) {
      selectDone = true;
      console.warn('[TeacherList] 타임아웃');
      showScreen('login-screen');
      showLoginError('교사 목록 로딩 시간 초과. 페이지를 새로고침하거나 GAS 스크립트 권한을 확인해 주세요.');
    }
  }, 10000);

  try {
    google.script.run
      .withSuccessHandler(function(list) {
        if (selectDone) return;
        selectDone = true;
        clearTimeout(selectTimeout);
        console.log('[TeacherList] 로드 완료:', (list || []).length + '명');
        var sel = document.getElementById('teacher-select');
        (list || []).forEach(function(t) {
          var opt = document.createElement('option');
          opt.value = t.name;
          opt.textContent = t.name + (t.subject ? ' (' + t.subject + ')' : '');
          sel.appendChild(opt);
        });
        showScreen('login-screen');
      })
      .withFailureHandler(function(e) {
        if (selectDone) return;
        selectDone = true;
        clearTimeout(selectTimeout);
        console.error('[TeacherList] 실패:', e);
        showScreen('login-screen');
        showLoginError('교사 목록을 불러올 수 없습니다: ' + (e.message || e));
      })
      .getTeacherNames();
  } catch (e) {
    if (!selectDone) {
      selectDone = true;
      clearTimeout(selectTimeout);
      showScreen('login-screen');
      showLoginError('교사 목록 요청 오류: ' + (e.message || e));
    }
  }
}

function showAutoMsg(msg) {
  var el = document.getElementById('login-auto-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

function showLoginError(msg) {
  var el = document.getElementById('login-error');
  el.textContent = msg;
  el.style.display = 'block';
}

/* ================================================================
   로그인 / 로그아웃
   ================================================================ */
function doLogin() {
  var name = document.getElementById('teacher-select').value;
  if (!name) { showLoginError('교사를 선택해 주세요.'); return; }

  var btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = '로그인 중...';
  document.getElementById('login-error').style.display = 'none';

  google.script.run
    .withSuccessHandler(function(res) {
      btn.disabled = false;
      btn.textContent = '로그인';
      if (res && res.loggedIn) {
        USER = res;
        enterApp();
      } else {
        showLoginError('로그인 실패: ' + (res.reason || '알 수 없는 오류'));
      }
    })
    .withFailureHandler(function(e) {
      btn.disabled = false;
      btn.textContent = '로그인';
      showLoginError('서버 오류: ' + (e.message || e));
    })
    .loginWithName(name);
}

function doLogout() {
  USER = null;
  CACHED_STATS = null;
  showScreen('login-screen');
}

/* ================================================================
   앱 진입
   ================================================================ */
function enterApp() {
  console.log('[enterApp] 시작');
  // 화면 전환을 최우선 — 인라인 스타일로 강제 전환
  showScreen('app-screen');

  try {
    var displayName = (USER && USER.name) || (USER && USER.email) || '교사';
    var el1 = document.getElementById('user-name-display');
    var el2 = document.getElementById('user-avatar');
    if (el1) el1.textContent = displayName;
    if (el2) el2.textContent = displayName.charAt(0);

    var stFinal = document.getElementById('st-final-card');
    var btnFinal = document.getElementById('final-section-btn');
    if (!USER || !USER.isFinalApprover) {
      if (stFinal) stFinal.style.display = 'none';
      if (btnFinal) btnFinal.style.display = 'none';
    } else {
      if (stFinal) stFinal.style.display = '';
      if (btnFinal) btnFinal.style.display = '';
    }
  } catch (uiErr) {
    console.error('[enterApp] UI 초기화 오류:', uiErr);
  }

  CURRENT_SECTION = 'guidance';
  CURRENT_FILTER = 'my_pending';
  refreshDashboard();
  loadList();
}

/** 강제 로그인 화면 (스킵 버튼 / 타임아웃) */
function forceShowLogin() {
  console.log('[forceShowLogin] 로그인 화면으로 강제 전환');
  showScreen('login-screen');
  loadTeacherSelect();
}

/* ================================================================
   대시보드 새로고침
   ================================================================ */
function refreshDashboard() {
  google.script.run
    .withSuccessHandler(function(stats) {
      if (!stats) return;
      CACHED_STATS = stats;

      document.getElementById('st-my-pending').textContent  = stats.myPending;
      document.getElementById('st-my-approved').textContent  = stats.myApproved;
      document.getElementById('st-my-rejected').textContent  = stats.myRejected;
      document.getElementById('st-final-pending').textContent = stats.finalPending;

      // 탭 배지
      document.getElementById('tb-my-pending').textContent  = stats.myPending;
      document.getElementById('tb-my-approved').textContent  = stats.myApproved;
      document.getElementById('tb-my-rejected').textContent  = stats.myRejected;
      document.getElementById('tb-final-pending').textContent = stats.finalPending;
      document.getElementById('tb-final-approved').textContent = stats.finalApproved;
      document.getElementById('tb-final-rejected').textContent = stats.finalRejected;
    })
    .getDashboardData(USER.name);
}

/* ================================================================
   섹션 & 탭 전환
   ================================================================ */
function switchSection(section) {
  CURRENT_SECTION = section;
  document.querySelectorAll('.section-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.section === section);
  });

  document.getElementById('guidance-tabs').style.display = section === 'guidance' ? 'flex' : 'none';
  document.getElementById('final-tabs').style.display    = section === 'final'    ? 'flex' : 'none';

  // 기본 필터
  if (section === 'guidance') {
    CURRENT_FILTER = 'my_pending';
    activateTabPill('guidance-tabs', 'my_pending');
  } else {
    CURRENT_FILTER = 'final_pending';
    activateTabPill('final-tabs', 'final_pending');
  }
  loadList();
}

function switchTab(btn, section) {
  CURRENT_FILTER = btn.dataset.filter;
  activateTabPill(section === 'guidance' ? 'guidance-tabs' : 'final-tabs', CURRENT_FILTER);
  loadList();
}

function activateTabPill(containerId, filter) {
  document.querySelectorAll('#' + containerId + ' .tab-pill').forEach(function(b) {
    b.classList.toggle('active', b.dataset.filter === filter);
  });
}

function goTab(section, filter) {
  switchSection(section);
  CURRENT_FILTER = filter;
  activateTabPill(section === 'guidance' ? 'guidance-tabs' : 'final-tabs', filter);
  loadList();
}

/* ================================================================
   목록 로드
   ================================================================ */
function loadList() {
  var container = document.getElementById('app-list');
  container.innerHTML = '<div class="list-loading"><div class="spinner-sm"></div><div style="color:var(--text-s);font-size:.9rem;">불러오는 중...</div></div>';

  google.script.run
    .withSuccessHandler(renderList)
    .withFailureHandler(function(e) {
      container.innerHTML = '<div class="empty-state"><div class="empty-icon">&#9888;&#65039;</div><div class="empty-msg">데이터를 불러올 수 없습니다.<br>' + (e.message || e) + '</div></div>';
    })
    .getApplicationsByFilter(USER.name, CURRENT_FILTER);
}

function renderList(apps) {
  var container = document.getElementById('app-list');

  if (!apps || apps.length === 0) {
    var emptyMsg = CURRENT_FILTER.indexOf('pending') >= 0
      ? '처리 대기 중인 신청이 없습니다.'
      : '해당 조건의 신청 내역이 없습니다.';
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">&#128203;</div><div class="empty-msg">' + emptyMsg + '</div></div>';
    return;
  }

  var html = '';
  apps.forEach(function(a) {
    var status = a['상태'] || '대기';
    var isPending = CURRENT_FILTER.indexOf('pending') >= 0;
    var approvalType = CURRENT_SECTION === 'final' ? 'final' : 'guidance';

    html += '<div class="app-card status-' + status + '" onclick="openDetail(\'' + a['신청ID'] + '\')">';
    html += '  <div class="card-main">';
    html += '    <div class="card-top">';
    html += '      <span class="card-title">' + esc(a['실험제목'] || '(제목 없음)') + '</span>';
    html += '      <span class="status-badge ' + status + '">' + status + '</span>';
    html += '    </div>';
    html += '    <div class="card-meta">';
    html += '      <span>&#128100; ' + esc(a['대표자이름'] || '') + ' (' + esc(a['대표자학번'] || '') + ')</span>';
    html += '      <span>&#127981; ' + esc(a['신청실험실'] || '') + '</span>';
    html += '      <span>&#128197; ' + esc(a['실험할날짜'] || '') + '</span>';
    html += '      <span>&#128336; ' + esc(a['신청시간'] || '') + '</span>';
    html += '    </div>';
    html += '  </div>';

    if (isPending) {
      html += '  <div class="card-actions">';
      html += '    <button class="btn-approve" onclick="event.stopPropagation();quickApprove(\'' + a['신청ID'] + '\',\'' + approvalType + '\')">승인</button>';
      html += '    <button class="btn-reject" onclick="event.stopPropagation();openDetail(\'' + a['신청ID'] + '\')">상세</button>';
      html += '  </div>';
    }

    html += '</div>';
  });

  container.innerHTML = html;
}

/* ================================================================
   빠른 승인 (목록에서 바로)
   ================================================================ */
function quickApprove(appId, approvalType) {
  if (!confirm('해당 신청을 승인 처리하시겠습니까?')) return;

  showToast('처리 중...', 'info');
  google.script.run
    .withSuccessHandler(function(r) {
      if (r && r.success) {
        showToast(r.message, 'success');
        refreshDashboard();
        loadList();
      } else {
        showToast((r && r.message) || '처리 실패', 'error');
      }
    })
    .withFailureHandler(function(e) { showToast('오류: ' + (e.message || e), 'error'); })
    .processApproval(appId, approvalType, '승인', '');
}

/* ================================================================
   상세 모달
   ================================================================ */
function openDetail(appId) {
  var overlay = document.getElementById('detail-overlay');
  var body = document.getElementById('modal-body');
  body.innerHTML = '<div class="list-loading"><div class="spinner-sm"></div><div>로딩 중...</div></div>';
  overlay.classList.add('show');
  document.body.style.overflow = 'hidden';

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success) {
        body.innerHTML = '<div class="empty-state"><div class="empty-msg">' + ((res && res.message) || '데이터 없음') + '</div></div>';
        return;
      }
      DETAIL_DATA = res.data;
      renderDetail(res.data);
    })
    .withFailureHandler(function(e) {
      body.innerHTML = '<div class="empty-state"><div class="empty-msg">오류: ' + (e.message || e) + '</div></div>';
    })
    .getApplicationDetail(appId);
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('show');
  document.body.style.overflow = '';
  DETAIL_DATA = null;
}

function renderDetail(d) {
  var body = document.getElementById('modal-body');
  var status = calcStatus(d);
  document.getElementById('modal-title').textContent = d['실험제목'] || '신청 상세';

  var html = '';

  /* 기본 정보 */
  html += '<div class="detail-section"><h3>신청 정보</h3>';
  html += '<div class="detail-grid">';
  html += detailItem('신청자', (d['대표자이름'] || '') + ' (' + (d['대표자학번'] || '') + ')');
  html += detailItem('제출 일시', d['제출일시'] || '');
  html += detailItem('실험실', d['신청실험실'] || '');
  html += detailItem('실험 날짜', d['실험할날짜'] || '');
  html += detailItem('신청 시간', d['신청시간'] || '');
  html += detailItem('총 인원', d['총인원수'] || '');
  html += detailItem('동반자', d['동반자명단'] || '-', true);
  html += '</div></div>';

  /* 실험 내용 */
  html += '<div class="detail-section"><h3>실험 내용</h3>';
  html += '<div class="detail-grid">';
  html += detailItem('실험 제목', d['실험제목'] || '', true);
  html += detailItem('사용 목적', (d['사용목적'] || '') + (d['사용목적 기타'] ? ' — ' + d['사용목적 기타'] : ''), true);
  html += detailItemLong('실험 준비물', d['실험준비물'] || '-');
  html += detailItemLong('실험 과정', d['실험과정'] || '-');
  html += detailItemLong('뒷정리 계획', d['실험뒷정리'] || '-');
  html += detailItemLong('안전 주의사항', d['실험시 주의사항'] || '-');
  html += detailItem('안전 장구', d['안전장구'] || '-', true);
  html += '</div></div>';

  /* 장비 */
  if (d['첨단기기실 이용 여부'] === 'Yes' || d['후드 사용 여부'] === 'Yes') {
    html += '<div class="detail-section"><h3>장비 이용</h3>';
    html += '<div class="detail-grid">';
    if (d['첨단기기실 이용 여부'] === 'Yes') {
      html += detailItem('첨단기기실', d['첨단기기실 이용 사유'] || '사용 예정', true);
    }
    if (d['후드 사용 여부'] === 'Yes') {
      html += detailItem('흄 후드', d['후드 사용 사유'] || '사용 예정', true);
    }
    html += '</div></div>';
  }

  /* 승인 현황 타임라인 */
  html += '<div class="detail-section"><h3>승인 현황</h3>';
  html += '<div class="timeline">';

  // 신청
  html += '<div class="timeline-item done"><div class="tl-title">신청 접수</div><div class="tl-detail">' + esc(d['제출일시'] || '') + '</div></div>';

  // 지도교사
  var gs = d['지도승인여부'] || '';
  var gClass = gs === '승인' ? 'done' : gs === '반려' ? 'rejected' : 'pending';
  html += '<div class="timeline-item ' + gClass + '"><div class="tl-title">지도교사 ' + (gs || '대기') + '</div>';
  html += '<div class="tl-detail">' + esc(d['지도교사이름'] || '') + (d['지도승인의견'] ? ' — ' + esc(d['지도승인의견']) : '') + '</div></div>';

  // 최종
  var fs = d['최종승인여부'] || '';
  var fClass = fs === '승인' ? 'done' : fs === '반려' ? 'rejected' : (gs === '승인' ? 'pending' : '');
  if (gs === '승인' || fs) {
    html += '<div class="timeline-item ' + fClass + '"><div class="tl-title">최종 ' + (fs || '대기') + '</div>';
    html += '<div class="tl-detail">' + (d['최종승인의견'] ? esc(d['최종승인의견']) : '') + '</div></div>';
  }
  html += '</div></div>';

  /* 액션 영역 */
  var canGuidance = (d['지도교사이름'] === USER.name && !d['지도승인여부']);
  var canFinal    = (USER.isFinalApprover && d['지도승인여부'] === '승인' && !d['최종승인여부']);

  if (canGuidance || canFinal) {
    var aType = canGuidance ? 'guidance' : 'final';
    var aLabel = canGuidance ? '지도교사 승인 처리' : '최종 승인 처리';

    html += '<div class="action-area">';
    html += '<h3>' + aLabel + '</h3>';
    html += '<div class="action-btns">';
    html += '  <button class="action-btn approve" id="act-approve" onclick="selectDecision(\'승인\')">&#10003; 승인</button>';
    html += '  <button class="action-btn reject" id="act-reject" onclick="selectDecision(\'반려\')">&#10007; 반려</button>';
    html += '</div>';
    html += '<div class="comment-wrap" id="comment-wrap">';
    html += '  <label id="comment-label">의견 (선택)</label>';
    html += '  <textarea id="comment-input" placeholder="승인 또는 반려 의견을 입력해 주세요..."></textarea>';
    html += '</div>';
    html += '<button class="submit-btn" id="submit-btn" onclick="submitDecision(\'' + d['신청ID'] + '\',\'' + aType + '\')" disabled>결정을 선택해 주세요</button>';
    html += '</div>';
  }

  body.innerHTML = html;
}

var SELECTED_DECISION = '';

function selectDecision(dec) {
  SELECTED_DECISION = dec;
  var approveBtn = document.getElementById('act-approve');
  var rejectBtn  = document.getElementById('act-reject');
  var commentWrap = document.getElementById('comment-wrap');
  var commentLabel = document.getElementById('comment-label');
  var submitBtn = document.getElementById('submit-btn');

  approveBtn.classList.toggle('selected', dec === '승인');
  rejectBtn.classList.toggle('selected', dec === '반려');

  commentWrap.classList.add('show');
  if (dec === '반려') {
    commentLabel.textContent = '반려 사유 (필수)';
    document.getElementById('comment-input').setAttribute('required', 'true');
  } else {
    commentLabel.textContent = '승인 의견 (선택)';
    document.getElementById('comment-input').removeAttribute('required');
  }

  submitBtn.disabled = false;
  submitBtn.textContent = dec + ' 처리하기';
  submitBtn.style.background = dec === '승인' ? 'var(--success)' : 'var(--danger)';
}

function submitDecision(appId, approvalType) {
  if (!SELECTED_DECISION) return;

  var comment = (document.getElementById('comment-input').value || '').trim();
  if (SELECTED_DECISION === '반려' && !comment) {
    showToast('반려 시 사유를 입력해 주세요.', 'error');
    document.getElementById('comment-input').focus();
    return;
  }

  var confirmMsg = SELECTED_DECISION === '승인'
    ? '해당 신청을 승인 처리하시겠습니까?'
    : '해당 신청을 반려 처리하시겠습니까?\n\n사유: ' + comment;
  if (!confirm(confirmMsg)) return;

  var btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '처리 중...';

  google.script.run
    .withSuccessHandler(function(r) {
      if (r && r.success) {
        showToast(r.message, 'success');
        closeDetail();
        refreshDashboard();
        loadList();
      } else {
        showToast((r && r.message) || '처리 실패', 'error');
        btn.disabled = false;
        btn.textContent = SELECTED_DECISION + ' 처리하기';
      }
    })
    .withFailureHandler(function(e) {
      showToast('오류: ' + (e.message || e), 'error');
      btn.disabled = false;
      btn.textContent = SELECTED_DECISION + ' 처리하기';
    })
    .processApproval(appId, approvalType, SELECTED_DECISION, comment);
}

/* ================================================================
   유틸리티
   ================================================================ */
function showScreen(id) {
  console.log('[showScreen] → ' + id);
  // 인라인 스타일로 강제 전환 (CSS 클래스 문제 방지)
  var all = document.querySelectorAll('.screen');
  for (var i = 0; i < all.length; i++) {
    all[i].style.display = 'none';
    all[i].classList.remove('active');
  }
  var target = document.getElementById(id);
  if (target) {
    target.style.display = (id === 'login-screen') ? 'flex' : 'block';
    target.classList.add('active');
    console.log('[showScreen] ' + id + ' display=' + target.style.display);
  } else {
    console.error('[showScreen] 엘리먼트 없음: ' + id);
  }
}

function calcStatus(a) {
  if (a['최종승인여부'] === '승인') return '최종승인';
  if (a['지도승인여부'] === '반려' || a['최종승인여부'] === '반려') return '반려';
  if (a['지도승인여부'] === '승인') return '1차승인';
  return '대기';
}

function esc(s) {
  var d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function detailItem(label, value, full) {
  return '<div class="detail-item' + (full ? ' full' : '') + '"><div class="label">' + label + '</div><div class="value">' + esc(value) + '</div></div>';
}

function detailItemLong(label, value) {
  return '<div class="detail-item full"><div class="label">' + label + '</div><div class="value long">' + esc(value) + '</div></div>';
}

function showToast(msg, type) {
  var container = document.getElementById('toast-container');
  var toast = document.createElement('div');
  toast.className = 'toast ' + (type || 'info');
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(function() {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity .3s';
    setTimeout(function() { toast.remove(); }, 300);
  }, 3500);
}

/* 키보드: ESC로 모달 닫기 */
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeDetail();
});

/* PWA 서비스워커 등록 */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('?page=sw').catch(function(e) {
    console.log('[SW] 등록 실패 (GAS 환경에서는 정상):', e.message);
  });
}

/* iOS 홈화면 앱 감지 */
if (window.navigator.standalone === true) {
  console.log('[PWA] iOS 홈화면 앱 모드');
  document.body.style.paddingTop = 'env(safe-area-inset-top)';
}
