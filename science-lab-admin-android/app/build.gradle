plugins {
    id 'com.android.application'
}

android {
    namespace 'kr.hs.cnsa.sciencelab'
    compileSdk 34

    defaultConfig {
        applicationId "kr.hs.cnsa.sciencelab"
        minSdk 24          // Android 7.0+
        targetSdk 34       // Android 14
        versionCode 1
        versionName "1.0.0"

        // 웹앱 URL 설정 - 여기만 변경하면 됩니다
        buildConfigField "String", "WEB_APP_URL",
            "\"https://script.google.com/macros/s/AKfycbw0_z0I1E-l4jNFvwb3zVqSzDjwsGNyXLk1WdAwubGOcLP4nCAzKRjwzfLuE0aT1dnVMg/exec\""
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
        }
    }

    buildFeatures {
        buildConfig true
        viewBinding true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core:1.12.0'
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
    implementation 'androidx.webkit:webkit:1.9.0'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
}
