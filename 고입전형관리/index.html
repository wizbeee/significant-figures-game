<script>
// ══════════════════════════════════════════════
// DATA LAYER - IndexedDB
// ══════════════════════════════════════════════
const DB_NAME = 'goip-admission';
const DB_VER = 3;
let db = null;

function openDB() {
  return new Promise((res, rej) => {
    if (db) return res(db);
    const r = indexedDB.open(DB_NAME, DB_VER);
    r.onupgradeneeded = e => {
      const d = e.target.result;
      const tx = e.currentTarget.transaction;
      if (!d.objectStoreNames.contains('applicants')) {
        const s = d.createObjectStore('applicants', { keyPath: 'id', autoIncrement: true });
        s.createIndex('exam_number', '수험번호');
        s.createIndex('school', '출신중');
        s.createIndex('result', '합불여부');
        s.createIndex('type', '전형구분');
        s.createIndex('year', '_학년도');
      } else {
        const s = tx.objectStore('applicants');
        if (!s.indexNames.contains('year')) s.createIndex('year', '_학년도');
      }
      if (!d.objectStoreNames.contains('meta')) {
        d.createObjectStore('meta', { keyPath: 'key' });
      }
      if (!d.objectStoreNames.contains('mockExams')) {
        const m = d.createObjectStore('mockExams', { keyPath: 'id', autoIncrement: true });
        m.createIndex('기수', '기수');
        m.createIndex('실시년월', '실시년월');
        m.createIndex('응시학년', '응시학년');
        m.createIndex('이름', '이름');
        m.createIndex('dedupe', '_dedupe', { unique: false });
      }
    };
    r.onsuccess = () => { db = r.result; res(db); };
    r.onerror = () => rej(r.error);
  });
}

function txStore(name, mode = 'readonly') {
  return db.transaction(name, mode).objectStore(name);
}
function pr(req) {
  return new Promise((res, rej) => { req.onsuccess = () => res(req.result); req.onerror = () => rej(req.error); });
}

async function getAllApplicants() {
  await openDB();
  return pr(txStore('applicants').getAll());
}

async function clearAndImport(records) {
  await openDB();
  const store = txStore('applicants', 'readwrite');
  await pr(store.clear());
  for (const r of records) await pr(store.add(r));
  const total = await pr(txStore('applicants').count());
  const meta = txStore('meta', 'readwrite');
  await pr(meta.put({ key: 'lastUpload', date: new Date().toISOString(), count: total }));
}

async function appendRecords(records) {
  await openDB();
  const existing = await pr(txStore('applicants').getAll());
  const keySet = new Set(existing.map(r => r['수험번호'] ? `${r['_학년도']||''}_${r['수험번호']}` : `${r['_학년도']||''}_${r['성명']}__${r['출신중']}`));
  const store = txStore('applicants', 'readwrite');
  let added = 0, skipped = 0;
  for (const r of records) {
    const key = r['수험번호'] ? `${r['_학년도']||''}_${r['수험번호']}` : `${r['_학년도']||''}_${r['성명']}__${r['출신중']}`;
    if (keySet.has(key)) { skipped++; continue; }
    keySet.add(key);
    await pr(store.add(r));
    added++;
  }
  const total = await pr(txStore('applicants').count());
  const meta = txStore('meta', 'readwrite');
  await pr(meta.put({ key: 'lastUpload', date: new Date().toISOString(), count: total }));
  return { added, skipped, total };
}

async function clearAllData() {
  await openDB();
  await pr(txStore('applicants', 'readwrite').clear());
  const meta = txStore('meta', 'readwrite');
  await pr(meta.put({ key: 'lastUpload', date: new Date().toISOString(), count: 0 }));
}

async function getMetaInfo() {
  await openDB();
  try { return await pr(txStore('meta').get('lastUpload')); } catch { return null; }
}

// ── Mock Exam CRUD ──
async function getAllMockExams() {
  await openDB();
  return pr(txStore('mockExams').getAll());
}
async function addMockExams(records) {
  await openDB();
  const existing = await pr(txStore('mockExams').getAll());
  const keySet = new Set(existing.map(r => r._dedupe));
  const store = txStore('mockExams', 'readwrite');
  let added = 0, updated = 0;
  for (const r of records) {
    if (!r._dedupe) r._dedupe = `${r.기수||''}_${r.실시년월||''}_${r.응시학년||''}_${r.이름||''}_${r.반||''}_${r.번호||''}`;
    if (keySet.has(r._dedupe)) {
      // update existing
      const old = existing.find(e => e._dedupe === r._dedupe);
      if (old) { r.id = old.id; await pr(store.put(r)); updated++; }
    } else {
      delete r.id;
      await pr(store.add(r));
      keySet.add(r._dedupe);
      added++;
    }
  }
  return { added, updated };
}
async function updateMockExam(record) {
  await openDB();
  if (!record._dedupe) record._dedupe = `${record.기수||''}_${record.실시년월||''}_${record.응시학년||''}_${record.이름||''}_${record.반||''}_${record.번호||''}`;
  return pr(txStore('mockExams', 'readwrite').put(record));
}
async function deleteMockExam(id) {
  await openDB();
  return pr(txStore('mockExams', 'readwrite').delete(id));
}
async function deleteMockExamBatch(filterFn) {
  await openDB();
  const all = await pr(txStore('mockExams').getAll());
  const store = txStore('mockExams', 'readwrite');
  let n = 0;
  for (const r of all) { if (filterFn(r)) { await pr(store.delete(r.id)); n++; } }
  return n;
}
async function clearAllMockExams() {
  await openDB();
  return pr(txStore('mockExams', 'readwrite').clear());
}

// EXCEL PARSER
// ══════════════════════════════════════════════
const COL_MAP = {
  '성명(한글)': '성명', '성명': '성명',
  '합불': '합불여부', '합불여부': '합불여부',
  '면접': '면접점수', '면접점수': '면접점수',
  '합산': '최종점수', '최종점수': '최종점수',
  '학번(6자리)': '학번',
  '나이스학번(1학년)': '나이스학번',
};

function normalizeRecord(row) {
  const r = {};
  for (const [key, val] of Object.entries(row)) {
    const k = key.trim();
    const mapped = COL_MAP[k] || k;
    const strVal = val != null ? String(val).trim() : '';
    if (r[mapped] && !strVal) continue;
    r[mapped] = strVal;
  }
  if (r['합불여부']) {
    const v = r['합불여부'].trim();
    if (/합격|합/.test(v) && !/불/.test(v)) r['합불여부'] = '합격';
    else if (/불합격|불/.test(v)) r['합불여부'] = '불합격';
    else if (/대기|후보/.test(v)) r['합불여부'] = '후보';
  }
  const numFields = ['교과성적', '출석', '1단계 최종점수', '면접점수', '감점', '최종점수', '무단 결석', '무단 지각, 조퇴, 결과'];
  for (const f of numFields) {
    if (r[f] !== undefined && r[f] !== '') r[f] = parseFloat(r[f]) || 0;
  }
  for (const [k, v] of Object.entries(r)) {
    if (/학기|환산점수|평균|검정고시/.test(k) && v !== '') r[k] = parseFloat(v) || 0;
  }
  return r;
}

function extractYearFromSheetName(name) {
  const m = name.match(/(\d{4})\s*학년도/);
  if (m) return m[1];
  const m2 = name.match(/(\d{4})/);
  return m2 ? m2[1] : '미지정';
}

function readFileAsWorkbook(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = e => {
      try { res(XLSX.read(e.target.result, { type: 'array' })); }
      catch (err) { rej(err); }
    };
    reader.onerror = () => rej(reader.error);
    reader.readAsArrayBuffer(file);
  });
}

function parseSheet(wb, sheetName) {
  const ws = wb.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
  const year = extractYearFromSheetName(sheetName);
  return rows.map(r => {
    const nr = normalizeRecord(r);
    nr['_학년도'] = year;
    nr['_시트명'] = sheetName;
    return nr;
  }).filter(r => r['성명'] && r['성명'].trim());
}

// 과목 정규화 (유사어 → 카테고리)
const MOCK_SUBJECT_NORMALIZE = {
  // 국어
  '국어': '국어', '언어와매체': '국어', '언어와 매체': '국어', '화법과작문': '국어', '화법과 작문': '국어', '언매': '국어', '화작': '국어',
  // 수학
  '수학': '수학', '확률과통계': '수학', '확률과 통계': '수학', '미적분': '수학', '기하': '수학', '확통': '수학',
  // 영어
  '영어': '영어',

  '한국사': '한국사',
  // 탐구 - 사회
  '사회': '사회탐구', '사회탐구': '사회탐구', '통합사회': '사회탐구', '공통사회': '사회탐구', '통사': '사회탐구',
  '한국지리': '사회탐구', '한국 지리': '사회탐구', '세계지리': '사회탐구', '세계 지리': '사회탐구',
  '윤리와사상': '사회탐구', '윤리와 사상': '사회탐구', '생활과윤리': '사회탐구', '생활과 윤리': '사회탐구',

  '동아시아사': '사회탐구', '세계사': '사회탐구', '경제': '사회탐구',
  // 탐구 - 과학
  '과학': '과학탐구', '과학탐구': '과학탐구', '통합과학': '과학탐구', '공통과학': '과학탐구', '통과': '과학탐구',

};
function normalizeSubject(name) {
  if (!name) return '';
  const s = String(name).trim();
  return MOCK_SUBJECT_NORMALIZE[s] || s;
}
function parseGradeNum(v) {
  if (v == null || v === '') return null;
  const n = parseFloat(v);
  return (isNaN(n) || n < 1 || n > 9) ? null : n;
}
function parseScoreNum(v) {
  if (v == null || v === '') return null;
  const n = parseFloat(v);
  return isNaN(n) ? null : n;
}

// 양식 자동 감지 후 2D 배열에서 레코드 추출
function detectMockFormat(aoa) {
  // A: 2줄 헤더, "학년도"/"한국사"/"탐구영역1" 존재
  // B: 1줄 헤더, "국어과목"/"수학과목"/"영어과목" 존재
  const topRows = aoa.slice(0, 5).map(r => (r || []).map(c => String(c||'').trim()));
  const flat = topRows.flat().join('|');
  if (/국어과목|수학과목|영어과목/.test(flat)) return 'B';
  if (/학년도|탐구영역|한국사/.test(flat)) return 'A';
  // fallback: if row 1 has 국어/수학/영어 as standalone cells → B
  if (topRows[0] && topRows[0].some(c => c === '국어') && topRows[0].some(c => c === '수학')) return 'B';
  return null;
}

// 양식 A 파싱: 2줄 병합 헤더 구조
function parseMockFormatA(aoa) {
  // Find header rows: look for row with "학년도"/"학년" and "이름"
  let mainRow = -1;
  for (let i = 0; i < Math.min(6, aoa.length); i++) {
    const row = (aoa[i] || []).map(c => String(c||'').trim());
    if (row.some(c => /이름/.test(c)) && row.some(c => /국어|한국사/.test(c))) { mainRow = i; break; }
  }
  if (mainRow < 0) return { records: [], columns: [] };
  const subRow = mainRow + 1;
  const main = (aoa[mainRow] || []).map(c => String(c||'').trim());
  const sub = (aoa[subRow] || []).map(c => String(c||'').trim());
  // Propagate merged cells (fill empty main cells with previous non-empty)
  const mainFilled = [];
  let cur = '';
  for (let i = 0; i < Math.max(main.length, sub.length); i++) {
    if (main[i]) cur = main[i];
    mainFilled[i] = cur;
  }
  // Build column map: idx → { category, subHeader }
  const colMap = mainFilled.map((cat, i) => ({ idx: i, cat, sub: sub[i] || '' }));
  // Find columns for each field
  const findCol = (cat, subName) => {
    const match = colMap.find(c => c.cat === cat && (subName ? c.sub === subName : true));
    return match ? match.idx : -1;
  };
  const findMeta = (name) => {
    const m = colMap.find(c => c.cat === name && !c.sub) || colMap.find(c => c.cat === name);
    return m ? m.idx : -1;
  };
  const cols = {
    학년도: findMeta('학년도'),
    학년: findMeta('학년'),
    반: findMeta('반'),
    번호: findMeta('번호'),
    이름: findMeta('이름'),
    국어_원점수: findCol('국어', '원점수'),
    국어_등급: findCol('국어', '등급'),
    수학_원점수: findCol('수학', '원점수'),
    수학_등급: findCol('수학', '등급'),
    영어_원점수: findCol('영어', '원점수'),
    영어_등급: findCol('영어', '등급'),
    한국사_원점수: findCol('한국사', '원점수'),
    한국사_등급: findCol('한국사', '등급'),
    탐1_과목: (() => { const c = colMap.find(c => c.cat === '탐구영역1' && /과목명|선택/.test(c.sub)); return c ? c.idx : -1; })(),
    탐1_원점수: findCol('탐구영역1', '원점수'),
    탐1_등급: findCol('탐구영역1', '등급'),
    탐2_과목: (() => { const c = colMap.find(c => c.cat === '탐구영역2' && /과목명|선택/.test(c.sub)); return c ? c.idx : -1; })(),
    탐2_원점수: findCol('탐구영역2', '원점수'),
    탐2_등급: findCol('탐구영역2', '등급'),
  };
  // If 국어/수학 등급 not found at sub level, look for "선택" for those categories (file3 structure)
  if (cols.국어_등급 < 0) cols.국어_등급 = findCol('국어', '등급');
  const records = [];
  for (let i = subRow + 1; i < aoa.length; i++) {
    const row = aoa[i] || [];
    const name = String(row[cols.이름] || '').trim();
    if (!name) continue;
    const rec = {
      학년도_raw: row[cols.학년도],
      학년: parseScoreNum(row[cols.학년]),
      반: parseScoreNum(row[cols.반]),
      번호: parseScoreNum(row[cols.번호]),
      이름: name,
      국어_원점수: parseScoreNum(row[cols.국어_원점수]),
      국어_등급: parseGradeNum(row[cols.국어_등급]),
      수학_원점수: parseScoreNum(row[cols.수학_원점수]),
      수학_등급: parseGradeNum(row[cols.수학_등급]),
      영어_원점수: parseScoreNum(row[cols.영어_원점수]),
      영어_등급: parseGradeNum(row[cols.영어_등급]),
      한국사_원점수: parseScoreNum(row[cols.한국사_원점수]),
      한국사_등급: parseGradeNum(row[cols.한국사_등급]),
      탐1_과목: normalizeSubject(row[cols.탐1_과목]),
      탐1_과목_원본: String(row[cols.탐1_과목]||'').trim(),
      탐1_원점수: parseScoreNum(row[cols.탐1_원점수]),
      탐1_등급: parseGradeNum(row[cols.탐1_등급]),
      탐2_과목: normalizeSubject(row[cols.탐2_과목]),
      탐2_과목_원본: String(row[cols.탐2_과목]||'').trim(),
      탐2_원점수: parseScoreNum(row[cols.탐2_원점수]),
      탐2_등급: parseGradeNum(row[cols.탐2_등급]),
    };
    records.push(rec);
  }
  return { records, columns: cols };
}

// 양식 B 파싱: 1줄 헤더, "과목"이 여러번 나타남
function parseMockFormatB(aoa) {
  if (!aoa.length) return { records: [], columns: [] };
  const header = (aoa[0] || []).map(c => String(c||'').trim());
  // find columns
  const idx = {};
  idx.학년 = header.indexOf('학년');
  idx.반 = header.indexOf('반');
  idx.번호 = header.indexOf('번호');
  idx.이름 = header.indexOf('이름');
  // 국어/수학/영어 블록: <과목>과목, 원점수, 등급
  const findBlock = (cat) => {
    const i = header.indexOf(cat + '과목');
    if (i < 0) return { 과목: -1, 원점수: -1, 등급: -1 };
    return { 과목: i, 원점수: i+1, 등급: i+2 };
  };
  idx.국어 = findBlock('국어');
  idx.수학 = findBlock('수학');
  idx.영어 = findBlock('영어');
  // 이후 "과목"이 3번 반복 (탐1/탐2/한국사)
  const genericCols = [];
  for (let i = 0; i < header.length; i++) {
    if (header[i] === '과목') genericCols.push(i);
  }
  // 순서: 탐1, 탐2, 한국사
  idx.탐1 = genericCols[0] != null ? { 과목: genericCols[0], 원점수: genericCols[0]+1, 등급: genericCols[0]+2 } : { 과목:-1,원점수:-1,등급:-1 };
  idx.탐2 = genericCols[1] != null ? { 과목: genericCols[1], 원점수: genericCols[1]+1, 등급: genericCols[1]+2 } : { 과목:-1,원점수:-1,등급:-1 };
  idx.한국사 = genericCols[2] != null ? { 과목: genericCols[2], 원점수: genericCols[2]+1, 등급: genericCols[2]+2 } : { 과목:-1,원점수:-1,등급:-1 };

  const records = [];
  for (let i = 1; i < aoa.length; i++) {
    const row = aoa[i] || [];
    const name = String(row[idx.이름] || '').trim();
    if (!name) continue;
    const get = (c) => c >= 0 ? row[c] : null;
    records.push({
      학년도_raw: '',
      학년: parseScoreNum(get(idx.학년)),
      반: parseScoreNum(get(idx.반)),
      번호: parseScoreNum(get(idx.번호)),
      이름: name,
      국어_원점수: parseScoreNum(get(idx.국어.원점수)),
      국어_등급: parseGradeNum(get(idx.국어.등급)),
      수학_원점수: parseScoreNum(get(idx.수학.원점수)),
      수학_등급: parseGradeNum(get(idx.수학.등급)),
      영어_원점수: parseScoreNum(get(idx.영어.원점수)),
      영어_등급: parseGradeNum(get(idx.영어.등급)),
      한국사_원점수: parseScoreNum(get(idx.한국사.원점수)),
      한국사_등급: parseGradeNum(get(idx.한국사.등급)),
      탐1_과목: normalizeSubject(get(idx.탐1.과목)),
      탐1_과목_원본: String(get(idx.탐1.과목)||'').trim(),
      탐1_원점수: parseScoreNum(get(idx.탐1.원점수)),
      탐1_등급: parseGradeNum(get(idx.탐1.등급)),
      탐2_과목: normalizeSubject(get(idx.탐2.과목)),
      탐2_과목_원본: String(get(idx.탐2.과목)||'').trim(),
      탐2_원점수: parseScoreNum(get(idx.탐2.원점수)),
      탐2_등급: parseGradeNum(get(idx.탐2.등급)),
    });
  }
  return { records, columns: idx };
}

function parseMockExamWorkbook(wb) {
  // 시트별로 시도, 여러 시트가 있으면 첫 데이터 시트 사용
  const candidates = [];
  for (const sn of wb.SheetNames) {
    const ws = wb.Sheets[sn];
    const aoa = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
    const format = detectMockFormat(aoa);
    if (!format) continue;
    const parsed = format === 'A' ? parseMockFormatA(aoa) : parseMockFormatB(aoa);
    if (parsed.records.length > 0) {
      candidates.push({ sheetName: sn, format, ...parsed });
    }
  }
  // 가장 많은 레코드를 가진 시트 선택
  candidates.sort((a, b) => b.records.length - a.records.length);
  return candidates[0] || null;
}

// 계산 함수
function mockCalcFields(rec) {
  const 국 = rec.국어_등급, 수 = rec.수학_등급, 영 = rec.영어_등급;
  const 탐1 = rec.탐1_등급, 탐2 = rec.탐2_등급;
  const 한 = rec.한국사_등급;
  const 탐평균 = (탐1 != null && 탐2 != null) ? (탐1 + 탐2) / 2 : (탐1 ?? 탐2);
  const 합2 = (국 != null && 수 != null) ? 국 + 수 : null;
  const 합3 = (국 != null && 수 != null && 영 != null) ? 국 + 수 + 영 : null;
  const 합4 = (국 != null && 수 != null && 영 != null && 탐평균 != null) ? 국 + 수 + 영 + 탐평균 : null;
  const 합5 = (국 != null && 수 != null && 영 != null && 탐1 != null && 탐2 != null) ? 국 + 수 + 영 + 탐1 + 탐2 : null;
  const vals = [국, 수, 영, 탐1, 탐2, 한].filter(v => v != null);
  const 등급평균 = vals.length ? vals.reduce((s,v)=>s+v, 0) / vals.length : null;
  return { 탐평균, 합2, 합3, 합4, 합5, 등급평균 };
}

function num(v) { return parseFloat(v) || 0; }
function fmt(v, d = 1) { return v != null && v !== '' ? Number(v).toFixed(d) : '-'; }

function getGradeFields(record) {
  const converted = {};
  const semesters = ['2-1학기', '2-2학기', '3-1학기', '3-2학기'];
  const subjects = ['국어', '수학', '과학', '영어'];
  for (const sem of semesters) {
    for (const sub of subjects) {
      const key = `${sem} ${sub}(환산점수)`;
      if (record[key] !== undefined) converted[key] = num(record[key]);
    }
  }
  return converted;
}

function getSchoolList(data) {
  const map = {};
  data.forEach(d => {
    const s = d['출신중'] || '미지정';
    if (!map[s]) map[s] = { total: 0, pass: 0, fail: 0 };
    map[s].total++;
    if (d['합불여부'] === '합격') map[s].pass++;
    else if (d['합불여부'] === '불합격') map[s].fail++;
  });
  return Object.entries(map).sort((a, b) => b[1].total - a[1].total);
}

async function handleDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('dragover');
  const files = [...e.dataTransfer.files].filter(f => /\.(xlsx|xls|csv)$/i.test(f.name));
  if (files.length) await addFilesToPending(files);
}

async function handleFileSelect(e) {
  const files = [...e.target.files];
  if (files.length) await addFilesToPending(files);
  e.target.value = '';
}

async function addFilesToPending(files) {
  const listEl = document.getElementById('file-list');
  for (const file of files) {
    try {
      const wb = await readFileAsWorkbook(file);
      const sheetNames = wb.SheetNames;
      const sheetInfo = sheetNames.map(name => {
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[name], { defval: '' });
        const valid = rows.filter(r => { const nr = normalizeRecord(r); return nr['성명'] && nr['성명'].trim(); }).length;
        const year = extractYearFromSheetName(name);
        return { name, totalRows: rows.length, validRows: valid, year };
      });
      // 다중 시트 선택: 기본으로 유효 데이터가 있는 시트 모두 선택
      const selectedSheets = sheetInfo.filter(si => si.validRows > 0).map(si => si.name);
      pendingFiles.push({ file, wb, sheetNames, sheetInfo, selectedSheets });
    } catch (err) {
      listEl.innerHTML += `<div class="card p-3 border-red-200 bg-red-50 text-sm text-red-700 flex items-center gap-2">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        ${file.name}: ${err.message}</div>`;
    }
  }
  renderPendingFiles();
}

function toggleSheet(fileIdx, sheetName) {
  const pf = pendingFiles[fileIdx];
  const idx = pf.selectedSheets.indexOf(sheetName);
  if (idx >= 0) pf.selectedSheets.splice(idx, 1);
  else pf.selectedSheets.push(sheetName);
  renderPendingFiles();
}

function renderPendingFiles() {
  const listEl = document.getElementById('file-list');
  const actionsEl = document.getElementById('upload-actions');
  if (!pendingFiles.length) { listEl.innerHTML = ''; actionsEl.classList.add('hidden'); return; }
  actionsEl.classList.remove('hidden');

  listEl.innerHTML = pendingFiles.map((pf, idx) => `
    <div class="card p-4 space-y-3">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span class="text-sm font-semibold text-gray-900">${pf.file.name}</span>
          <span class="text-xs text-gray-400">(${(pf.file.size/1024).toFixed(0)} KB)</span>
        </div>
        <button onclick="pendingFiles.splice(${idx},1); renderPendingFiles()" class="p-1.5 rounded-lg hover:bg-red-50 text-gray-400 hover:text-red-500 transition" title="제거">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div>
        <label class="text-xs font-medium text-gray-600 block mb-1.5">시트 선택 (${pf.sheetNames.length}개 시트 · 복수 선택 가능)</label>
        <div class="flex flex-wrap gap-2">
          ${pf.sheetInfo.map(si => {
            const checked = pf.selectedSheets.includes(si.name);
            return `
            <label class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium border transition cursor-pointer ${checked
              ? 'bg-blue-600 text-white border-blue-600'

async function executeUpload() {
  if (!pendingFiles.length) return;
  const mode = document.querySelector('input[name="upload-mode"]:checked')?.value || 'append';
  const statusEl = document.getElementById('upload-status');
  statusEl.innerHTML = '<div class="card p-4 text-center text-sm text-gray-500"><div class="animate-pulse">업로드 처리 중...</div></div>';

  try {
    let allRecords = [];
    const fileResults = [];
    for (const pf of pendingFiles) {
      for (const sheetName of pf.selectedSheets) {
        const records = parseSheet(pf.wb, sheetName);
        fileResults.push({ name: pf.file.name, sheet: sheetName, count: records.length, year: extractYearFromSheetName(sheetName) });
        allRecords = allRecords.concat(records);
      }
    }
    if (allRecords.length === 0) throw new Error('유효한 데이터가 없습니다.');

    let result;
    if (mode === 'replace') {
      await clearAndImport(allRecords);
      result = { added: allRecords.length, skipped: 0, total: allRecords.length };
    } else {
      result = await appendRecords(allRecords);
    }

    allData = await getAllApplicants();
    updateDataCount();
    pendingFiles = [];
    renderPendingFiles();

    statusEl.innerHTML = `
      <div class="card p-5 border-green-200 bg-green-50 space-y-3">
        <div class="flex items-center gap-2">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <span class="font-semibold text-green-800">업로드 완료!</span>
        </div>
        <div class="text-sm text-green-700 space-y-1">
          ${fileResults.map(fr => `<div>- ${fr.name} / ${fr.sheet} (${fr.year}학년도) : ${fr.count}명</div>`).join('')}
        </div>
        <div class="text-sm font-medium text-green-900 pt-2 border-t border-green-200">
          추가: ${result.added}명 ${result.skipped > 0 ? `· 중복 건너뜀: ${result.skipped}명` : ''} · 전체: ${result.total}명
        </div>
        <button onclick="navigateTo('dashboard')" class="mt-1 px-4 py-2 bg-green-600 text-white rounded-xl text-sm font-medium hover:bg-green-700 transition">대시보드 보기</button>
      </div>`;
    renderUploadMeta();
  } catch (err) {
    statusEl.innerHTML = `<div class="card p-4 border-red-200 bg-red-50 text-red-700 text-sm">오류: ${err.message}</div>`;
  }
}

async function exportBackup() {
  const data = await getAllApplicants();
  const mocks = await getAllMockExams();
  if (!data.length && !mocks.length) { alert('데이터가 없습니다.'); return; }
  const cleanData = data.map(r => { const { id, ...rest } = r; return rest; });
  const cleanMocks = mocks.map(r => { const { id, ...rest } = r; return rest; });
  const blob = new Blob([JSON.stringify({ version: 4, date: new Date().toISOString(), count: data.length, mockCount: mocks.length, applicants: cleanData, mockExams: cleanMocks }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `고입전형_백업_${new Date().toISOString().slice(0,10)}.json`; a.click();
}

async function restoreBackup(e) {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const backup = JSON.parse(text);
    let msg = [];
    if (backup.applicants && Array.isArray(backup.applicants)) {
      const result = await appendRecords(backup.applicants);
      allData = await getAllApplicants();
      msg.push(`지원자 추가 ${result.added}명, 중복 ${result.skipped}명 (총 ${result.total}명)`);
    }
    if (backup.mockExams && Array.isArray(backup.mockExams)) {
      const res2 = await addMockExams(backup.mockExams);
      allMockExams = await getAllMockExams();
      msg.push(`모의고사 추가 ${res2.added}건, 갱신 ${res2.updated}건`);
    }
    if (!msg.length) { alert('유효하지 않은 백업 파일입니다.'); return; }
    updateDataCount();
    alert('복원 완료!\n' + msg.join('\n'));
    navigateTo('upload');
  } catch (err) { alert('복원 오류: ' + err.message); }
  e.target.value = '';
}

let listPage = 1, listSearch = '', listTypeFilter = '', listResultFilter = '';
let listSortKey = '최종점수', listSortDir = 'desc';

function renderList(el) {
  const data = getFilteredData();
  if (!data.length) { el.innerHTML = '<div class="p-8 text-gray-400 text-center">데이터를 먼저 업로드하세요.</div>'; return; }

  const types = [...new Set(data.map(r => r['전형구분']).filter(Boolean))];
  let filtered = data;
  if (listSearch) { const q = listSearch.toLowerCase(); filtered = filtered.filter(r => (r['성명']||'').toLowerCase().includes(q) || (r['수험번호']||'').includes(q) || (r['출신중']||'').toLowerCase().includes(q)); }
  if (listTypeFilter) filtered = filtered.filter(r => r['전형구분'] === listTypeFilter);
  if (listResultFilter) filtered = filtered.filter(r => r['합불여부'] === listResultFilter);

  // Sort
  filtered = [...filtered].sort((a, b) => {
    let va = a[listSortKey], vb = b[listSortKey];
    const na = num(va), nb = num(vb);
    if (na || nb) { va = na; vb = nb; } else { va = String(va||''); vb = String(vb||''); }
    if (va < vb) return listSortDir === 'asc' ? -1 : 1;
    if (va > vb) return listSortDir === 'asc' ? 1 : -1;
    return 0;
  });

  const pageSize = 50;
  const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
  listPage = Math.min(listPage, totalPages);
  const rows = filtered.slice((listPage - 1) * pageSize, listPage * pageSize);

  const sortTh = (key, label, align = 'left') => {
    const active = listSortKey === key;
    const arrow = active ? (listSortDir === 'asc' ? '▲' : '▼') : '⇅';
    return `<th class="px-3 py-2.5 text-${align} text-xs font-semibold text-gray-500 sortable ${active?'sort-active':''}" onclick="listSortKey='${key}'; listSortDir=listSortKey==='${key}'&&listSortDir==='desc'?'asc':'desc'; listPage=1; renderList(document.getElementById('main-content'))">${label}<span class="sort-arrow">${arrow}</span></th>`;

        <select onchange="listTypeFilter=this.value; listPage=1; renderList(document.getElementById('main-content'))">
          <option value="">전체 전형</option>
          ${types.map(t => `<option value="${t}" ${listTypeFilter===t?'selected':''}>${t}</option>`).join('')}
        </select>
        <select onchange="listResultFilter=this.value; listPage=1; renderList(document.getElementById('main-content'))">
          <option value="">전체 결과</option>
          <option value="합격" ${listResultFilter==='합격'?'selected':''}>합격</option>
          <option value="불합격" ${listResultFilter==='불합격'?'selected':''}>불합격</option>
        </select>
      </div>
      <div class="card overflow-hidden"><div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead><tr class="border-b border-gray-100 bg-gray-50/80">

            ${sortTh('교과성적','교과성적','center')}${sortTh('출석','출석','center')}${sortTh('1단계 최종점수','1단계','center')}${sortTh('면접점수','면접','center')}${sortTh('최종점수','최종점수','center')}${sortTh('합불여부','합불','center')}

      </div></div>
      ${totalPages > 1 ? `<div class="flex items-center justify-center gap-2">
        <button onclick="listPage=Math.max(1,listPage-1); renderList(document.getElementById('main-content'))" class="px-3 py-1.5 rounded-lg border border-gray-200 text-sm ${listPage===1?'opacity-40':'hover:bg-gray-50'}">이전</button>
        <span class="text-sm text-gray-600">${listPage} / ${totalPages}</span>
        <button onclick="listPage=Math.min(${totalPages},listPage+1); renderList(document.getElementById('main-content'))" class="px-3 py-1.5 rounded-lg border border-gray-200 text-sm ${listPage===totalPages?'opacity-40':'hover:bg-gray-50'}">다음</button>
      </div>` : ''}
    </div>`;
}

function exportFiltered() {
  let filtered = getFilteredData();
  if (listSearch) { const q = listSearch.toLowerCase(); filtered = filtered.filter(r => (r['성명']||'').toLowerCase().includes(q) || (r['수험번호']||'').includes(q) || (r['출신중']||'').toLowerCase().includes(q)); }
  if (listTypeFilter) filtered = filtered.filter(r => r['전형구분'] === listTypeFilter);
  if (listResultFilter) filtered = filtered.filter(r => r['합불여부'] === listResultFilter);
  if (!filtered.length) { alert('내보낼 데이터가 없습니다.'); return; }
  const keys = ['접수번호','수험번호','성명','출신중','전형구분','교과성적','출석','1단계 최종점수','면접점수','최종점수','합불여부','_학년도'];
  const csv = '\uFEFF' + keys.join(',') + '\n' + filtered.map(r => keys.map(k => { const v = String(r[k]??''); return v.includes(',') ? `"${v}"` : v; }).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = '지원자목록.csv'; a.click();
}

function renderAnalysis(el) {
  const data = getFilteredData();
  if (!data.length) { el.innerHTML = '<div class="p-8 text-gray-400 text-center">데이터를 먼저 업로드하세요.</div>'; return; }

  const metrics = [
    { key: '교과성적', label: '교과성적', color: '#3b82f6' },
    { key: '1단계 최종점수', label: '1단계 최종점수', color: '#6366f1' },
    { key: '면접점수', label: '면접점수', color: '#8b5cf6' },
    { key: '최종점수', label: '최종점수', color: '#a855f7' },
  ];

  function calcStats(arr, key) {
    const vals = arr.map(r => num(r[key])).filter(v => v > 0);
    if (!vals.length) return { avg: 0, max: 0, min: 0, std: 0, median: 0, count: 0 };
    vals.sort((a, b) => a - b);
    const avg = vals.reduce((s, v) => s + v, 0) / vals.length;
    const std = Math.sqrt(vals.reduce((s, v) => s + (v - avg) ** 2, 0) / vals.length);
    const median = vals.length % 2 === 0 ? (vals[vals.length/2-1] + vals[vals.length/2]) / 2 : vals[Math.floor(vals.length/2)];
    return { avg, max: vals[vals.length-1], min: vals[0], std, median, count: vals.length };
  }

  function passFailStats(arr, key) {
    const passVals = arr.filter(r => r['합불여부']==='합격').map(r => num(r[key])).filter(v => v > 0);
    const failVals = arr.filter(r => r['합불여부']==='불합격').map(r => num(r[key])).filter(v => v > 0);
    const avg = a => a.length ? a.reduce((s,v)=>s+v,0)/a.length : 0;
    return { passAvg: avg(passVals), failAvg: avg(failVals) };
  }

  function cutlineHtml(arr, metricsList) {
    return metricsList.map(m => {
      const vals = arr.map(r => num(r[m.key])).filter(v => v > 0).sort((a,b) => b - a);
      const n = vals.length;
      if (!n) return `<tr class="border-b border-gray-50"><td class="py-2 font-medium">${m.label}</td><td colspan="5" class="py-2 text-center text-gray-400">데이터 없음</td></tr>`;
      return `<tr class="border-b border-gray-50"><td class="py-2 font-medium">${m.label}</td><td class="py-2 text-center">${n}</td><td class="py-2 text-center font-mono text-green-600 font-semibold">${fmt(vals[0])}</td><td class="py-2 text-center font-mono text-blue-600 font-semibold">${fmt(vals[Math.min(Math.floor(n*0.5),n-1)])}</td><td class="py-2 text-center font-mono text-orange-600 font-semibold">${fmt(vals[Math.min(Math.floor(n*0.7),n-1)])}</td><td class="py-2 text-center font-mono text-red-600 font-semibold">${fmt(vals[n-1])}</td></tr>`;
    }).join('');
  }

  el.innerHTML = `
    <div class="p-6 max-w-7xl mx-auto space-y-6">
      <h1 class="text-2xl font-bold text-gray-900">데이터 분석</h1>
      ${yearFilterHtml()}

      <div class="card p-5">
        <h3 class="font-semibold text-gray-900 mb-4">기술통계 요약</h3>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead><tr class="border-b"><th class="py-2 text-left text-xs text-gray-500">항목</th><th class="py-2 text-center text-xs text-gray-500">N</th><th class="py-2 text-center text-xs text-gray-500">평균</th><th class="py-2 text-center text-xs text-gray-500">중앙값</th><th class="py-2 text-center text-xs text-gray-500">최고</th><th class="py-2 text-center text-xs text-gray-500">최저</th><th class="py-2 text-center text-xs text-gray-500">표준편차</th><th class="py-2 text-center text-xs text-gray-500">합격 평균</th><th class="py-2 text-center text-xs text-gray-500">불합격 평균</th></tr></thead>
            <tbody>
              ${metrics.map(m => {
                const s = calcStats(data, m.key);
                const pf = passFailStats(data, m.key);
                return `<tr class="border-b border-gray-50"><td class="py-2 font-medium">${m.label}</td><td class="py-2 text-center">${s.count}</td><td class="py-2 text-center font-mono font-semibold">${fmt(s.avg)}</td><td class="py-2 text-center font-mono">${fmt(s.median)}</td><td class="py-2 text-center font-mono text-green-600">${fmt(s.max)}</td><td class="py-2 text-center font-mono text-red-500">${fmt(s.min)}</td><td class="py-2 text-center font-mono">${fmt(s.std)}</td><td class="py-2 text-center font-mono text-green-700 font-semibold">${fmt(pf.passAvg)}</td><td class="py-2 text-center font-mono text-red-600">${fmt(pf.failAvg)}</td></tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <div class="card p-5">
        <h3 class="font-semibold text-gray-900 mb-4">컷트라인 분석</h3>
        <p class="text-xs text-gray-500 mb-3">점수를 내림차순 정렬하여 상위 50%, 70%, 100%(최하위) 위치의 점수를 표시합니다.</p>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead><tr class="border-b"><th class="py-2 text-left text-xs text-gray-500">항목</th><th class="py-2 text-center text-xs text-gray-500">N</th><th class="py-2 text-center text-xs text-gray-500">최고점</th><th class="py-2 text-center text-xs text-gray-500">상위 50%</th><th class="py-2 text-center text-xs text-gray-500">상위 70%</th><th class="py-2 text-center text-xs text-gray-500">컷트라인(100%)</th></tr></thead>
            <tbody>${cutlineHtml(data, metrics)}</tbody>
          </table>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-6">
        ${metrics.map(m => `<div class="card p-5"><h3 class="font-semibold text-gray-900 mb-2">${m.label} 분포</h3><div class="chart-container"><canvas id="chart-dist-${m.key.replace(/\s/g,'-')}"></canvas></div></div>`).join('')}
      </div>

      <div class="card p-5"><h3 class="font-semibold text-gray-900 mb-4">합격 vs 불합격 평균 비교</h3><div class="chart-container"><canvas id="chart-compare"></canvas></div></div>
      <div class="card p-5"><h3 class="font-semibold text-gray-900 mb-4">1단계 점수 vs 최종점수 산점도</h3><div class="chart-container" style="height:400px"><canvas id="chart-scatter"></canvas></div></div>
    </div>`;

  setTimeout(() => {
    metrics.forEach(m => {
      const vals = data.map(r => num(r[m.key])).filter(v => v > 0);
      if (!vals.length) return;
      const min = Math.floor(Math.min(...vals)), max = Math.ceil(Math.max(...vals));
      const binSize = Math.max(1, Math.ceil((max - min) / 15));
      const bins = {};
      for (let i = min; i <= max; i += binSize) bins[`${i}-${i+binSize}`] = 0;
      vals.forEach(v => { const idx = Math.floor((v - min) / binSize) * binSize + min; const label = `${idx}-${idx+binSize}`; if (bins[label] !== undefined) bins[label]++; });
      const canvas = document.getElementById(`chart-dist-${m.key.replace(/\s/g,'-')}`);
      if (canvas) new Chart(canvas, { type: 'bar', data: { labels: Object.keys(bins), datasets: [{ data: Object.values(bins), backgroundColor: m.color + '99', borderColor: m.color, borderWidth: 1 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } } });
    });

    const passAvgs = metrics.map(m => passFailStats(data, m.key).passAvg);
    const failAvgs = metrics.map(m => passFailStats(data, m.key).failAvg);
    new Chart(document.getElementById('chart-compare'), { type: 'bar', data: { labels: metrics.map(m => m.label), datasets: [{ label: '합격 평균', data: passAvgs, backgroundColor: '#22c55e' }, { label: '불합격 평균', data: failAvgs, backgroundColor: '#ef4444' }] }, options: { responsive: true, maintainAspectRatio: false } });

    const scatterData = data.filter(r => num(r['1단계 최종점수']) > 0 && num(r['최종점수']) > 0);
    new Chart(document.getElementById('chart-scatter'), { type: 'scatter', data: { datasets: [
      { label: '합격', data: scatterData.filter(r => r['합불여부']==='합격').map(r => ({ x: num(r['1단계 최종점수']), y: num(r['최종점수']) })), backgroundColor: '#22c55e88', borderColor: '#22c55e', pointRadius: 4 },
      { label: '불합격', data: scatterData.filter(r => r['합불여부']!=='합격').map(r => ({ x: num(r['1단계 최종점수']), y: num(r['최종점수']) })), backgroundColor: '#ef444488', borderColor: '#ef4444', pointRadius: 4 },
    ]}, options: { responsive: true, maintainAspectRatio: false, scales: { x: { title: { display: true, text: '1단계 최종점수' } }, y: { title: { display: true, text: '최종점수' } } } } });
  }, 50);
}

let compareMode = 'year'; // year, type, school
let compareSelected = []; // up to 5 selections
const CMP_COLORS = ['#3b82f6','#ef4444','#f59e0b','#10b981','#8b5cf6'];
const CMP_BG = ['bg-blue-50/30 border-blue-200','bg-red-50/30 border-red-200','bg-amber-50/30 border-amber-200','bg-emerald-50/30 border-emerald-200','bg-violet-50/30 border-violet-200'];
const CMP_TEXT = ['text-blue-800','text-red-800','text-amber-800','text-emerald-800','text-violet-800'];

function toggleCompareSelection(val) {
  const idx = compareSelected.indexOf(val);
  if (idx >= 0) compareSelected.splice(idx, 1);
  else if (compareSelected.length < 5) compareSelected.push(val);
  renderCompare(document.getElementById('main-content'));
}

function renderCompare(el) {
  if (!allData.length) { el.innerHTML = '<div class="p-8 text-gray-400 text-center">데이터를 먼저 업로드하세요.</div>'; return; }

  const years = getYears();
  const types = [...new Set(allData.map(r => r['전형구분']).filter(Boolean))].sort();
  const schools = [...new Set(allData.map(r => r['출신중']).filter(Boolean))].sort();

  let options = [];
  if (compareMode === 'year') options = years;
  else if (compareMode === 'type') options = types;
  else options = schools;

  // Auto-select first 2 if empty
  if (!compareSelected.length && options.length >= 2) compareSelected = options.slice(0, 2);
  else if (!compareSelected.length && options.length === 1) compareSelected = [options[0]];
  // Remove invalid selections
  compareSelected = compareSelected.filter(s => options.includes(s));

  function getGroup(sel) {
    if (compareMode === 'year') return allData.filter(r => (r['_학년도']||'미지정') === sel);
    if (compareMode === 'type') return allData.filter(r => r['전형구분'] === sel);
    return allData.filter(r => r['출신중'] === sel);
  }

  const metrics = ['교과성적', '1단계 최종점수', '면접점수', '최종점수'];

  function groupStats(arr) {
    const result = {};
    for (const key of metrics) {
      const vals = arr.map(r => num(r[key])).filter(v => v > 0);
      if (!vals.length) { result[key] = { avg: 0, median: 0, max: 0, min: 0, count: 0 }; continue; }
      vals.sort((a,b) => a - b);
      const avg = vals.reduce((s,v) => s+v, 0) / vals.length;
      const median = vals.length % 2 === 0 ? (vals[vals.length/2-1]+vals[vals.length/2])/2 : vals[Math.floor(vals.length/2)];
      result[key] = { avg, median, max: vals[vals.length-1], min: vals[0], count: vals.length };
    }
    result._total = arr.length;
    result._pass = arr.filter(r => r['합불여부']==='합격').length;
    result._fail = arr.filter(r => r['합불여부']==='불합격').length;
    return result;
  }

  const groups = compareSelected.map((sel, i) => ({ sel, data: getGroup(sel), stats: groupStats(getGroup(sel)), color: CMP_COLORS[i], bg: CMP_BG[i], text: CMP_TEXT[i] }));

  el.innerHTML = `
    <div class="p-6 max-w-7xl mx-auto space-y-6">
      <h1 class="text-2xl font-bold text-gray-900">비교 분석</h1>

      <div class="card p-4 flex items-center gap-4">
        <span class="text-sm font-semibold text-gray-600">비교 기준:</span>
        <button onclick="compareMode='year'; compareSelected=[]; renderCompare(document.getElementById('main-content'))" class="tab-btn ${compareMode==='year'?'active':''}">학년도별</button>
        <button onclick="compareMode='type'; compareSelected=[]; renderCompare(document.getElementById('main-content'))" class="tab-btn ${compareMode==='type'?'active':''}">전형별</button>
        <button onclick="compareMode='school'; compareSelected=[]; renderCompare(document.getElementById('main-content'))" class="tab-btn ${compareMode==='school'?'active':''}">학교별</button>
      </div>

      <div class="card p-4">
        <div class="flex items-center gap-2 mb-2">
          <span class="text-xs font-semibold text-gray-600">비교 대상 선택 (최대 5개):</span>
          <span class="text-xs text-gray-400">${compareSelected.length}/5 선택됨</span>
        </div>
        ${compareMode === 'school' ? `<input type="text" id="cmp-school-search" placeholder="학교 검색..." oninput="filterCmpSchools()" class="w-full mb-2">` : ''}
        <div class="flex flex-wrap gap-2 ${compareMode === 'school' ? 'max-h-40 overflow-y-auto' : ''}" id="cmp-options">
          ${options.map(o => {
            const idx = compareSelected.indexOf(o);
            const checked = idx >= 0;
            const colorDot = checked ? `<span class="w-3 h-3 rounded-full inline-block" style="background:${CMP_COLORS[idx]}"></span>` : '';
            return `<label class="cmp-opt flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium border cursor-pointer transition ${checked ? 'bg-gray-900 text-white border-gray-900' : 'bg-white text-gray-700 border-gray-200 hover:bg-gray-50'}" data-name="${o}">
              <input type="checkbox" class="hidden" ${checked?'checked':''} onchange="toggleCompareSelection('${o.replace(/'/g,"\\'")}')">
              ${colorDot} ${o}
            </label>`;
          }).join('')}
        </div>
      </div>

      ${groups.length === 0 ? '<div class="card p-8 text-center text-gray-400">비교할 대상을 선택하세요.</div>' : `
      <!-- Summary cards -->
      <div class="grid grid-cols-${Math.min(groups.length, 5)} gap-3">
        ${groups.map(g => `
          <div class="card p-4 ${g.bg}">
            <h4 class="font-semibold ${g.text} text-sm">${g.sel}</h4>
            <div class="grid grid-cols-3 gap-1 mt-2 text-xs">
              <div><span class="text-gray-500">지원</span> <b>${g.stats._total}</b></div>
              <div><span class="text-green-600">합격</span> <b>${g.stats._pass}</b></div>
              <div><span class="text-gray-500">합격률</span> <b>${g.stats._total ? (g.stats._pass/g.stats._total*100).toFixed(1) : 0}%</b></div>
            </div>
          </div>
        `).join('')}
      </div>

      <!-- Score comparison table -->
      <div class="card p-5">
        <h3 class="font-semibold text-gray-900 mb-4">성적 비교 (평균 / 중앙값)</h3>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead><tr class="border-b">
              <th class="py-2 text-left text-xs text-gray-500">항목</th>
              ${groups.map(g => `<th class="py-2 text-center text-xs" style="color:${g.color}">${g.sel}</th>`).join('')}
            </tr></thead>
            <tbody>
              ${metrics.map(key => `<tr class="border-b border-gray-50">
                <td class="py-2 font-medium">${key}</td>
                ${groups.map(g => `<td class="py-2 text-center font-mono"><span class="font-semibold">${fmt(g.stats[key].avg)}</span> <span class="text-gray-400 text-xs">/ ${fmt(g.stats[key].median)}</span></td>`).join('')}
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <!-- Cutline comparison -->
      <div class="card p-5">
        <h3 class="font-semibold text-gray-900 mb-4">컷트라인 비교 (상위 50% / 70% / 100%)</h3>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead><tr class="border-b">
              <th class="py-2 text-left text-xs text-gray-500">항목</th>
              ${groups.map(g => `<th class="py-2 text-center text-xs" style="color:${g.color}">${g.sel}</th>`).join('')}
            </tr></thead>
            <tbody>
              ${metrics.map(key => `<tr class="border-b border-gray-50">
                <td class="py-2 font-medium">${key}</td>
                ${groups.map(g => {
                  const vals = g.data.map(r => num(r[key])).filter(v => v > 0).sort((a,b) => b - a);
                  const n = vals.length;
                  if (!n) return '<td class="py-2 text-center text-gray-400 text-xs">-</td>';
                  return `<td class="py-2 text-center font-mono text-xs"><span class="text-blue-600">${fmt(vals[Math.min(Math.floor(n*0.5),n-1)])}</span> / <span class="text-orange-600">${fmt(vals[Math.min(Math.floor(n*0.7),n-1)])}</span> / <span class="text-red-600">${fmt(vals[n-1])}</span></td>`;
                }).join('')}
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <div class="card p-5"><h3 class="font-semibold text-gray-900 mb-4">평균 비교 차트</h3><div class="chart-container"><canvas id="chart-cmp-bar"></canvas></div></div>
      <div class="card p-5"><h3 class="font-semibold text-gray-900 mb-4">합격률 비교</h3><div class="chart-container" style="height:${Math.max(150, groups.length * 40)}px"><canvas id="chart-cmp-rate"></canvas></div></div>
      `}
    </div>`;

  if (!groups.length) return;

  setTimeout(() => {
    new Chart(document.getElementById('chart-cmp-bar'), {
      type: 'bar',
      data: { labels: metrics, datasets: groups.map(g => ({ label: g.sel, data: metrics.map(k => g.stats[k].avg), backgroundColor: g.color })) },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } } }
    });
    new Chart(document.getElementById('chart-cmp-rate'), {
      type: 'bar',
      data: { labels: groups.map(g => g.sel), datasets: [{ label: '합격률(%)', data: groups.map(g => g.stats._total ? (g.stats._pass/g.stats._total*100) : 0), backgroundColor: groups.map(g => g.color) }] },
      options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, scales: { x: { max: 100 } }, plugins: { legend: { display: false } } }
    });
  }, 50);
}

let selectedSchool = '', selectedSchoolType = '';
let schoolMockSession = '';
let schoolSortKey = '최종점수', schoolSortDir = 'desc';

function renderSchool(el) {

              ${sessions.map(s => { const [c, m, g] = s.split('|'); return `<option value="${s}" ${schoolMockSession===s?'selected':''}>${c}학년도 / ${m} / ${g}학년</option>`; }).join('')}

            </tr></thead>
            <tbody>
              ${sorted.map(r => {
                // 모의고사 찾기
                let mockCandidates = allMockExams.filter(m => m.이름 === r['성명']);
                if (schoolMockSession) {
                  const [c, mm, g] = schoolMockSession.split('|');
                  mockCandidates = mockCandidates.filter(m => String(m.기수)===c && m.실시년월===mm && String(m.응시학년)===g);

                  mockCandidates = mockCandidates.slice(0, 1);

                const mock = mockCandidates[0];

                  <td class="px-2 py-2 text-center font-mono text-xs">${mc ? mg(mc.탐평균) : '-'}</td>

                  <td class="px-2 py-2 text-center font-mono text-xs">${mc ? mg(mc.합3) : '-'}</td>
                  <td class="px-2 py-2 text-center font-mono text-xs">${mc ? mg(mc.합4) : '-'}</td>
                  <td class="px-2 py-2 text-center font-mono text-xs">${mc ? mg(mc.합5) : '-'}</td>
                  <td class="px-2 py-2 text-center font-mono text-xs font-semibold text-purple-700">${mc ? mg(mc.등급평균) : '-'}</td>
                </tr>
              `;}).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  }

  el.innerHTML = `
    <div class="p-6 max-w-7xl mx-auto space-y-6">
      <h1 class="text-2xl font-bold text-gray-900">중학교별 분석</h1>
      ${yearFilterHtml()}
      ${detailHtml || `
      <div class="card p-3"><input type="text" id="school-search" placeholder="중학교 이름 검색..." oninput="filterSchoolList()" class="w-full"></div>
      <div class="card overflow-hidden">
        <table class="w-full text-sm" id="school-table">
          <thead><tr class="border-b bg-gray-50/80">
            <th class="px-4 py-2.5 text-left text-xs text-gray-500">출신중학교</th>
            <th class="px-4 py-2.5 text-center text-xs text-gray-500">지원자</th>
            <th class="px-4 py-2.5 text-center text-xs text-gray-500">합격</th>
            <th class="px-4 py-2.5 text-center text-xs text-gray-500">불합격</th>
            <th class="px-4 py-2.5 text-center text-xs text-gray-500">합격률</th>
            <th class="px-4 py-2.5 text-center text-xs text-gray-500">최종점수 평균</th>
          </tr></thead>
          <tbody id="school-tbody">
            ${schools.map(([name, info]) => {
              const studs = data.filter(r => r['출신중'] === name);
              const avgFinal = studs.length ? studs.reduce((s,r)=>s+num(r['최종점수']),0)/studs.length : 0;
              const rate = info.total > 0 ? (info.pass/info.total*100).toFixed(1) : '0.0';
              return `
              <tr class="border-b border-gray-50 hover:bg-blue-50/30 cursor-pointer school-row" data-name="${name}" onclick="selectedSchool='${name.replace(/'/g,"\\'")}'; renderSchool(document.getElementById('main-content'))">
                <td class="px-4 py-2.5 font-semibold text-gray-900">${name}</td>
                <td class="px-4 py-2.5 text-center">${info.total}</td>
                <td class="px-4 py-2.5 text-center text-green-700 font-medium">${info.pass}</td>
                <td class="px-4 py-2.5 text-center text-red-600">${info.fail}</td>
                <td class="px-4 py-2.5 text-center font-mono font-semibold">${rate}%</td>
                <td class="px-4 py-2.5 text-center font-mono">${fmt(avgFinal)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`}
    </div>`;

// PAGE: REPORT (editable + chart insertion)
// ══════════════════════════════════════════════
function renderReport(el) {
  const data = getFilteredData();
  if (!data.length) { el.innerHTML = '<div class="p-8 text-gray-400 text-center">데이터를 먼저 업로드하세요.</div>'; return; }

  const total = data.length;
  const pass = data.filter(r => r['합불여부']==='합격');
  const fail = data.filter(r => r['합불여부']==='불합격');
  const types = {};
  data.forEach(r => { const t = r['전형구분']||'미지정'; types[t] = (types[t]||0)+1; });
  const schools = getSchoolList(data);
  const avg = (arr, key) => arr.length ? (arr.reduce((s,r)=>s+num(r[key]),0)/arr.length).toFixed(2) : '-';
  const regions = {};
  data.forEach(r => { const reg = r['지역'] || '미지정'; regions[reg] = (regions[reg]||0)+1; });
  const yearLabel = yearFilter ? `${yearFilter}학년도 ` : '';

  // 컷트라인 for report
  const cutMetrics = ['교과성적', '1단계 최종점수', '면접점수', '최종점수'];
  function reportCutline(key) {
    const vals = data.map(r => num(r[key])).filter(v => v > 0).sort((a,b) => b - a);
    const n = vals.length;

function insertReportChart() {
  const data = getFilteredData();
  if (!data.length) return;

  const chartArea = document.getElementById('report-charts');
  if (!chartArea) return;

  const chartId = 'report-chart-' + Date.now();
  const wrapper = document.createElement('div');
  wrapper.className = 'border border-gray-200 rounded-xl p-4 space-y-2';
  wrapper.innerHTML = `
    <div class="flex items-center justify-between">
      <select id="${chartId}-type" class="text-sm" onchange="drawReportChart('${chartId}')">
        <option value="type-bar">전형구분별 인원</option>
        <option value="result-pie">합격/불합격 비율</option>
        <option value="score-bar">평균 점수 비교</option>
        <option value="school-bar">학교별 합격 TOP10</option>
      </select>
      <button onclick="this.closest('.border').remove()" class="text-xs text-red-500 hover:text-red-700">삭제</button>
    </div>
    <div style="height:250px"><canvas id="${chartId}"></canvas></div>
  `;
  chartArea.appendChild(wrapper);

  setTimeout(() => drawReportChart(chartId), 50);
}

function drawReportChart(chartId) {
  const data = getFilteredData();
  const canvas = document.getElementById(chartId);
  if (!canvas) return;

  const existingChart = Chart.getChart(canvas);
  if (existingChart) existingChart.destroy();

  const type = document.getElementById(chartId + '-type')?.value || 'type-bar';
  const colors = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316'];

  if (type === 'type-bar') {
    const types = {};
    data.forEach(r => { const t = r['전형구분']||'미지정'; types[t] = (types[t]||0)+1; });
    new Chart(canvas, { type: 'bar', data: { labels: Object.keys(types), datasets: [{ data: Object.values(types), backgroundColor: colors }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } });
  } else if (type === 'result-pie') {
    const p = data.filter(r => r['합불여부']==='합격').length;
    const f = data.filter(r => r['합불여부']==='불합격').length;
    new Chart(canvas, { type: 'doughnut', data: { labels: ['합격','불합격','기타'], datasets: [{ data: [p, f, data.length-p-f], backgroundColor: ['#22c55e','#ef4444','#94a3b8'] }] }, options: { responsive: true, maintainAspectRatio: false } });
  } else if (type === 'score-bar') {
    const keys = ['교과성적','1단계 최종점수','면접점수','최종점수'];
    const passAvg = keys.map(k => { const v = data.filter(r=>r['합불여부']==='합격').map(r=>num(r[k])).filter(v=>v>0); return v.length?v.reduce((s,x)=>s+x,0)/v.length:0; });
    const failAvg = keys.map(k => { const v = data.filter(r=>r['합불여부']==='불합격').map(r=>num(r[k])).filter(v=>v>0); return v.length?v.reduce((s,x)=>s+x,0)/v.length:0; });
    new Chart(canvas, { type: 'bar', data: { labels: keys, datasets: [{ label: '합격', data: passAvg, backgroundColor: '#22c55e' }, { label: '불합격', data: failAvg, backgroundColor: '#ef4444' }] }, options: { responsive: true, maintainAspectRatio: false } });
  } else if (type === 'school-bar') {
    const schools = getSchoolList(data).slice(0, 10);
    new Chart(canvas, { type: 'bar', data: { labels: schools.map(s=>s[0]), datasets: [{ label: '합격', data: schools.map(s=>s[1].pass), backgroundColor: '#22c55e' }, { label: '불합격', data: schools.map(s=>s[1].fail), backgroundColor: '#ef4444' }] }, options: { responsive: true, maintainAspectRatio: false, scales: { x: { stacked: true }, y: { stacked: true } } } });
  }
}

function printReport() {
  const content = document.getElementById('report-content');
  if (!content) return;
  // Convert canvases to images for print
  const canvases = content.querySelectorAll('canvas');
  const images = [];
  canvases.forEach(c => {
    const img = document.createElement('img');
    img.src = c.toDataURL('image/png');
    img.style.width = '100%';
    c.parentNode.insertBefore(img, c);
    c.style.display = 'none';
    images.push({ img, canvas: c });
  });

  const html = content.innerHTML;

  // Restore canvases
  images.forEach(({ img, canvas }) => {
    img.remove();
    canvas.style.display = '';
  });

  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>입학전형 결과 보고서</title>
    <script src="https://cdn.tailwindcss.com"><\/script>
    <style>@media print { body { font-size: 12px; } .card { border: 1px solid #ddd; box-shadow: none; } } [contenteditable] { outline: none; }</style>
  </head><body class="p-6 max-w-4xl mx-auto" style="font-family: 'Malgun Gothic', sans-serif">${html}</body></html>`);
  w.document.close();
  setTimeout(() => w.print(), 500);
}

async function saveMockManual(editId) {
  const g = id => document.getElementById('mm-' + id).value;
  const 이름 = g('이름').trim();
  const 기수 = g('기수').trim();
  const 실시년월 = g('실시년월').trim();

  if (!이름 || !기수 || !실시년월) { alert('기수, 실시년월, 이름은 필수입니다.'); return; }
  const rec = {
    기수, 실시년월, 응시학년,
    반: parseScoreNum(g('반')), 번호: parseScoreNum(g('번호')), 이름,

  };
  if (editId) rec.id = editId;
  rec._dedupe = `${rec.기수}_${rec.실시년월}_${rec.응시학년}_${rec.이름}_${rec.반||''}_${rec.번호||''}`;

  const resultEl = document.getElementById('mock-analyze-result');
  if (mockAnalyzeMode === 'individual') renderMockIndividualAnalysis(resultEl);
  else if (mockAnalyzeMode === 'school') renderMockSchoolAnalysis(resultEl);
  else if (mockAnalyzeMode === 'type') renderMockTypeAnalysis(resultEl);
}

function getAdmittedStudents() {
  // 합격자 대상
  return allData.filter(r => r['합불여부'] === '합격');
}
function mockRecordsForName(name) {
  return allMockExams.filter(r => r.이름 === name);
}
function mockRecordsForSchool(school) {
  const names = new Set(getAdmittedStudents().filter(r => r['출신중'] === school).map(r => ({ name: r['성명'], year: r['_학년도'] })).map(o => o.name));
  // 기수 매칭도 필요하지만 일단 이름으로
  const admittedByName = {};
  getAdmittedStudents().filter(r => r['출신중'] === school).forEach(r => { admittedByName[r['성명']] = r['_학년도']; });
  return allMockExams.filter(r => admittedByName[r.이름] != null);
}
function mockRecordsForType(type) {
  const admittedByName = {};
  getAdmittedStudents().filter(r => r['전형구분'] === type).forEach(r => { admittedByName[r['성명']] = r['_학년도']; });
  return allMockExams.filter(r => admittedByName[r.이름] != null);
}

function aggregateStats(records) {
  const fields = ['국어_등급','수학_등급','영어_등급','탐1_등급','탐2_등급','한국사_등급'];
  const stats = {};
  fields.forEach(f => {
    const vals = records.map(r => r[f]).filter(v => v != null);
    stats[f] = vals.length ? vals.reduce((s,v)=>s+v,0) / vals.length : null;
  });
  // Composite
  const calcVals = records.map(mockCalcFields);
  ['합2','합3','합4','합5','등급평균','탐평균'].forEach(f => {
    const vs = calcVals.map(c => c[f]).filter(v => v != null);
    stats[f] = vs.length ? vs.reduce((s,v)=>s+v,0) / vs.length : null;
  });
  stats.n = records.length;
  return stats;
}

    return `<tr class="border-b">
      <td class="px-2 py-1.5">${r.기수}</td>

      <td class="px-2 py-1.5 text-center font-mono">${gd(c.합4)}</td>
      <td class="px-2 py-1.5 text-center font-mono">${gd(c.합5)}</td>

    </tr>`;
  }).join('');

  // 동일 월 전년도 비교 (같은 실시월, 다른 기수)
  const byMonth = {};
  records.forEach(r => {
    const month = (r.실시년월||'').split('-')[1];
    if (!month) return;
    if (!byMonth[month]) byMonth[month] = [];
    byMonth[month].push(r);
  });
  let compareHtml = '';
  Object.entries(byMonth).forEach(([month, rs]) => {
    // 본인의 전년도 같은 월은 없을 수 있음 → 코호트 비교
    const cohortByYear = {};
    allMockExams.forEach(x => {
      if ((x.실시년월||'').split('-')[1] !== month) return;
      if (x.응시학년 !== rs[0].응시학년) return;
      if (!cohortByYear[x.기수]) cohortByYear[x.기수] = [];
      cohortByYear[x.기수].push(x);
    });
    const cohortStats = Object.entries(cohortByYear).map(([y, arr]) => ({ year: y, s: aggregateStats(arr) })).sort((a,b) => a.year.localeCompare(b.year));
    compareHtml += `<div class="bg-blue-50/50 rounded-xl p-3">

          <tbody>${rowsHtml}</tbody>

      </div>
      ${compareHtml}
    </div>`;
