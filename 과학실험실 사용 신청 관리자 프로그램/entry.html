<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>과학 실험·실습실 사용 신청 관리 시스템</title>
  <style>
    :root{
      --bg:#f6f7fb; --fg:#111; --muted:#6b7280; --card:#ffffff;
      --primary:#2563eb; --primary-600:#1d4ed8; --danger:#dc2626;
      --border:#e5e7eb;
      --radius:14px;
      --seg-bg:#f1f5f9; --seg-active-bg:#fff;
      --input-bg:#fff;
    }
    /* 다크모드 */
    [data-theme="dark"]{
      --bg:#1a1a2e; --fg:#e4e4e7; --muted:#a1a1aa; --card:#16213e;
      --primary:#3b82f6; --primary-600:#2563eb; --danger:#ef4444;
      --border:#374151;
      --seg-bg:#0f3460; --seg-active-bg:#1a1a2e;
      --input-bg:#1e293b;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; background:var(--bg); color:var(--fg); font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;
      display:flex; align-items:center; justify-content:center; padding:20px;
    }
    .card{
      width:min(560px, 92vw);
      background:var(--card); border:1px solid var(--border);
      border-radius:var(--radius); box-shadow:0 10px 30px rgba(0,0,0,.06);
      padding:26px 26px 22px;
      position:relative;
    }
    /* 다크모드 토글 버튼 */
    .theme-toggle{
      position:absolute; top:16px; right:16px;
      width:36px; height:36px; border:none; border-radius:50%;
      background:var(--seg-bg); cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:1.1rem; transition:background .2s;
    }
    .theme-toggle:hover{ opacity:.8; }
    .theme-icon-dark{ display:none; }
    [data-theme="dark"] .theme-icon-light{ display:none; }
    [data-theme="dark"] .theme-icon-dark{ display:inline; }
    
    h1{margin:0 0 4px 0; font-size:1.7rem; letter-spacing:.1px;}
    .sub{margin:0 0 18px 0; color:var(--muted); font-size:1rem}
    .seg{
      display:flex; gap:8px; background:var(--seg-bg); padding:6px; border-radius:999px; margin:10px 0 18px;
    }
    .seg button{
      flex:1; border:0; background:transparent; padding:12px 10px; border-radius:999px; cursor:pointer;
      font-weight:600; font-size:1.02rem; color:var(--fg);
    }
    .seg button.active{ background:var(--seg-active-bg); box-shadow:0 2px 8px rgba(0,0,0,.06); }
    .field{ margin:10px 0 2px; }
    .label{ display:block; font-size:.95rem; color:var(--muted); margin:0 0 8px 2px; font-weight:600 }
    .input{
      width:100%; height:48px; padding:0 14px; border:1px solid var(--border); border-radius:12px;
      font-size:1.05rem; outline:none; background:var(--input-bg); color:var(--fg);
    }
    .input:focus{ border-color:#cbd5e1; box-shadow:0 0 0 4px rgba(37,99,235,.10); }
    .actions{
      margin-top:16px; display:flex; justify-content:center; gap:10px; align-items:center;
    }
    .btn{
      height:48px; min-width:110px; padding:0 16px; border-radius:12px; border:1px solid transparent;
      font-weight:700; font-size:1.02rem; cursor:pointer;
    }
    .btn-primary{ background:var(--primary); color:#fff; }
    .btn-primary:hover{ background:var(--primary-600); }
    .btn-ghost{ background:var(--card); border-color:var(--border); color:var(--fg); }
    .btn-ghost:hover{ background:var(--seg-bg); }
    .help{ margin-top:10px; color:var(--muted); font-size:.95rem; text-align:center; }
    .error{ margin-top:10px; color:var(--danger); font-weight:700; text-align:center; min-height:1.2em; }
    /* 로그인 유지 체크박스 */
    .remember-row{
      display:flex; align-items:center; gap:8px; margin:12px 0 0 2px;
    }
    .remember-row input[type="checkbox"]{
      width:20px; height:20px; cursor:pointer; accent-color:var(--primary);
    }
    .remember-row label{
      font-size:.93rem; color:var(--muted); cursor:pointer; user-select:none;
    }
    .hidden{ display:none !important; }

    /* 전역 작업 오버레이 */
    #busyOverlay{
      position:fixed; inset:0; display:none; align-items:center; justify-content:center;
      background:rgba(0,0,0,.35); z-index:99999;
    }
    #busyOverlay .busy-box{
      background:var(--card); padding:16px 20px; border-radius:12px;
      box-shadow:0 6px 24px rgba(0,0,0,.2);
      display:flex; align-items:center; gap:10px; font-weight:600; font-size:1.05rem; color:var(--fg);
    }
    #busyOverlay .busy-spinner{
      width:18px; height:18px; border:3px solid #ddd; border-top-color:#0a84ff;
      border-radius:50%; animation:busyspin .9s linear infinite;
    }
    @keyframes busyspin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card" role="dialog" aria-modal="true" aria-labelledby="title">
    <!-- 다크모드 토글 -->
    <button class="theme-toggle" id="themeToggle" onclick="toggleDarkMode()" title="다크모드 전환" aria-label="다크모드 전환">
      <span class="theme-icon-light">☀️</span>
      <span class="theme-icon-dark">🌙</span>
    </button>
    
    <h1 id="title">과학 실험·실습실 사용 신청 관리 시스템</h1>
    <p class="sub">입장 방법을 선택해 주세요.</p>

    <div class="seg" role="tablist" aria-label="입장 방법">
      <button id="tab-id"  class="active" role="tab" aria-selected="true"  aria-controls="panel-id">교사 아이디</button>
      <button id="tab-pw"  role="tab" aria-selected="false" aria-controls="panel-pw">비밀번호</button>
    </div>

    <!-- 교사 아이디 패널 -->
    <section id="panel-id" role="tabpanel" aria-labelledby="tab-id">
      <div class="field">
        <label for="teacherId" class="label">교사 아이디</label>
        <input id="teacherId" class="input" placeholder="예: kimsamsung" autocomplete="username" />
      </div>
      <div class="remember-row">
        <input type="checkbox" id="rememberIdCheck" />
        <label for="rememberIdCheck">로그인 유지</label>
      </div>
      <div class="actions">
        <button class="btn btn-primary" id="btn-id-enter">입장</button>
        <button class="btn btn-ghost" id="btn-id-clear">지우기</button>
      </div>
      <div id="idError" class="error"></div>
    </section>

    <!-- 비밀번호 패널 -->
    <section id="panel-pw" class="hidden" role="tabpanel" aria-labelledby="tab-pw">
      <div class="field">
        <label for="adminPw" class="label">비밀번호</label>
        <input id="adminPw" class="input" type="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password" />
      </div>
      <div class="remember-row">
        <input type="checkbox" id="rememberPwCheck" />
        <label for="rememberPwCheck">로그인 유지</label>
      </div>
      <div class="actions">
        <button class="btn btn-primary" id="btn-pw-enter">입장</button>
        <button class="btn btn-ghost" id="btn-pw-clear">지우기</button>
      </div>
      <div id="pwError" class="error"></div>
    </section>
  </div>

  <!-- 전역 오버레이 -->
  <div id="busyOverlay">
    <div class="busy-box">
      <span class="busy-spinner"></span>
      <span id="busyMsg">처리 중… 잠시 기다려주세요.</span>
    </div>
  </div>

  <script>
    // ===== 로그인 유지 (localStorage) =====
    const STORAGE_KEY = 'lab-admin-remember';

    function getSavedLogin() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        return JSON.parse(raw);
      } catch(e) { return null; }
    }

    function saveLogin(type, value) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ type: type, value: value }));
      } catch(e) {}
    }

    function clearSavedLogin() {
      try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
    }

    // 페이지 로드 시 저장된 로그인 정보가 있으면 자동 로그인
    function tryAutoLogin() {
      const saved = getSavedLogin();
      if (!saved || !saved.value) return;

      showBusy('자동 로그인 중…');

      if (saved.type === 'id') {
        google.script.run
          .withSuccessHandler(function(res) {
            if (res && res.ok) {
              var m = document.getElementById('busyMsg');
              if (m) m.textContent = '로그인 되었습니다. 페이지를 불러오는 중입니다.';
              goAdmin();
            } else {
              hideBusy();
              clearSavedLogin(); // 저장된 정보가 유효하지 않으면 삭제
            }
          })
          .withFailureHandler(function() {
            hideBusy();
            clearSavedLogin();
          })
          .verifyTeacherId(saved.value);
      } else if (saved.type === 'pw') {
        google.script.run
          .withSuccessHandler(function(res) {
            if (res && res.ok) {
              var m = document.getElementById('busyMsg');
              if (m) m.textContent = '로그인 되었습니다. 페이지를 불러오는 중입니다.';
              goAdmin();
            } else {
              hideBusy();
              clearSavedLogin();
            }
          })
          .withFailureHandler(function() {
            hideBusy();
            clearSavedLogin();
          })
          .verifyPassword(saved.value);
      }
    }

    // ===== 다크모드 토글 =====
    function toggleDarkMode() {
      const html = document.documentElement;
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('lab-system-theme', newTheme);
    }
    
    // 페이지 로드 시 저장된 테마 적용
    (function initTheme() {
      const savedTheme = localStorage.getItem('lab-system-theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
    
    // ===== 탭 전환 =====
    const tabId = document.getElementById('tab-id');
    const tabPw = document.getElementById('tab-pw');
    const panelId = document.getElementById('panel-id');
    const panelPw = document.getElementById('panel-pw');

   // 모바일 기기 감지
   function isMobileDevice() {
     return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) ||
            (window.innerWidth <= 900);
   }

   // 관리자 페이지로 이동 (서버에서 현재 배포 URL을 받아 안전하게 이동)
  function goAdmin() {
     google.script.run
       .withSuccessHandler(function (baseUrl) {
         if (!baseUrl) {
           hideBusy();
           alert('관리자 URL을 가져오지 못했습니다.');
           return;
         }
         // 모바일이면 &platform=mobile 추가 → SPA 모드로 진입
         var url = baseUrl + '?view=admin';
         if (isMobileDevice()) {
           url += '&platform=mobile';
         }
         window.location.href = url;
       })
       .withFailureHandler(function (err) {
         hideBusy();
         alert('관리자 URL 호출 오류: ' + (err && (err.message || err)));
       })
       .getAppUrl();
   }


   // 각각의 성공 콜백은 결국 goAdmin만 호출
    function onTeacherLoginSuccess() { goAdmin(); }
    function onPasswordLoginSuccess() { goAdmin(); }

    function switchTo(which){
      const isId = (which === 'id');
      tabId.classList.toggle('active', isId);
      tabId.setAttribute('aria-selected', String(isId));
      tabPw.classList.toggle('active', !isId);
      tabPw.setAttribute('aria-selected', String(!isId));
      panelId.classList.toggle('hidden', !isId);
      panelPw.classList.toggle('hidden', isId);
      setTimeout(()=> (isId ? document.getElementById('teacherId') : document.getElementById('adminPw')).focus(), 0);
    }
    tabId.addEventListener('click', ()=>switchTo('id'));
    tabPw.addEventListener('click', ()=>switchTo('pw'));

    // ===== 전역 오버레이 =====
    let BUSY = 0;
    function showBusy(msg){
      BUSY++;
      const el = document.getElementById('busyOverlay');
      const m  = document.getElementById('busyMsg');
      if (m && msg) m.textContent = msg;
      el.style.display = 'flex';
      document.body.style.overflow = 'hidden';
      document.body.style.pointerEvents = 'none';
      el.style.pointerEvents = 'auto';
    }
    function hideBusy(){
      BUSY = Math.max(0, BUSY-1);
      if (BUSY>0) return;
      const el = document.getElementById('busyOverlay');
      el.style.display = 'none';
      document.body.style.overflow = '';
      document.body.style.pointerEvents = '';
    }

    // ===== 교사 아이디 입장 =====
    const teacherId = document.getElementById('teacherId');
    const idError = document.getElementById('idError');
    document.getElementById('btn-id-enter').addEventListener('click', ()=>{
      const raw = (teacherId.value || '').trim();
      if (!raw){ idError.textContent = '아이디를 입력해 주세요.'; teacherId.focus(); return; }
      idError.textContent = '';
      showBusy('확인 중…');

      google.script.run
        .withSuccessHandler(res => {
          if (res && res.ok) {
            // 로그인 유지 체크 시 저장
            if (document.getElementById('rememberIdCheck').checked) {
              saveLogin('id', raw);
            } else {
              clearSavedLogin();
            }
            const m = document.getElementById('busyMsg');
            if (m) m.textContent = '로그인 되었습니다. 페이지를 불러오는 중입니다. 잠시만 기다려주세요.';
            goAdmin();
          } else {
            hideBusy();
            idError.textContent = '허용된 교사 아이디가 아닙니다.';
          }
        })
        .withFailureHandler(err => {
          hideBusy();
          idError.textContent = '확인 중 오류가 발생했습니다: ' + (err && (err.message || err));
        })
        .verifyTeacherId(raw);
    });
    document.getElementById('btn-id-clear').addEventListener('click', ()=>{
      teacherId.value = ''; idError.textContent=''; teacherId.focus();
    });
    teacherId.addEventListener('keydown', e=>{
      if (e.key==='Enter') document.getElementById('btn-id-enter').click();
    });

    // ===== 비밀번호 입장 =====
    const adminPw = document.getElementById('adminPw');
    const pwError = document.getElementById('pwError');
    document.getElementById('btn-pw-enter').addEventListener('click', ()=>{
      const raw = (adminPw.value || '').trim();
      if (!raw){ pwError.textContent = '비밀번호를 입력해 주세요.'; adminPw.focus(); return; }
      pwError.textContent = '';
      showBusy('확인 중…');

      google.script.run
        .withSuccessHandler(res => {
          if (res && res.ok) {
            // 로그인 유지 체크 시 저장
            if (document.getElementById('rememberPwCheck').checked) {
              saveLogin('pw', raw);
            } else {
              clearSavedLogin();
            }
            const m = document.getElementById('busyMsg');
            if (m) m.textContent = '로그인 되었습니다. 페이지를 불러오는 중입니다. 잠시만 기다려주세요.';
            goAdmin();
          } else {
            hideBusy();
            pwError.textContent = '비밀번호가 올바르지 않습니다.';
          }
        })
        .withFailureHandler(err => {
          hideBusy();
          pwError.textContent = '확인 중 오류가 발생했습니다: ' + (err && (err.message || err));
        })
        .verifyPassword(raw);
    });
    document.getElementById('btn-pw-clear').addEventListener('click', ()=>{
      adminPw.value=''; pwError.textContent=''; adminPw.focus();
    });
    adminPw.addEventListener('keydown', e=>{
      if (e.key==='Enter') document.getElementById('btn-pw-enter').click();
    });

    // ===== 저장된 로그인 정보로 자동 입장 =====
    tryAutoLogin();
  </script>
</body>
</html>
