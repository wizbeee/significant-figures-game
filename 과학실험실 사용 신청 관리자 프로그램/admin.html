    <title>과학실험실 관리자 대시보드</title>
    <script>
    // ===== 모바일 자동 리다이렉트 =====
    // 북마크/직접 링크로 모바일 사용자가 ?view=admin에 직접 접근한 경우
    // 모바일 SPA(?platform=mobile)로 이동. ?platform=desktop 명시 시에는 존중.
    // sessionStorage 플래그로 재진입 루프 차단.
    (function(){
      try {
        var params = new URLSearchParams(window.location.search);
        var forced = (params.get('platform') || '').toLowerCase();
        if (forced === 'desktop') return; // 사용자 선택 존중
        if (sessionStorage.getItem('__mobileRedirectDone') === '1') return;
        var ua = navigator.userAgent || '';
        var isMobile = /Mobi|Android|iPhone|iPod|IEMobile|Opera Mini|BlackBerry/i.test(ua);
        var isiPadLike = (navigator.maxTouchPoints && navigator.maxTouchPoints > 1 && /Macintosh/i.test(ua));
        if (isMobile || isiPadLike) {
          sessionStorage.setItem('__mobileRedirectDone', '1');
          var qp = new URLSearchParams(window.location.search);
          qp.set('platform', 'mobile');
          qp.delete('view'); // 모바일은 SPA이므로 view는 제거
          window.location.replace(window.location.pathname + '?' + qp.toString());
        }
      } catch (e) { /* 실패 시 조용히 무시 */ }
    })();
    </script>

  </head>
