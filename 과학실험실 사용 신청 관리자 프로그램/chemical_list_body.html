<!-- chemical_list_body.html -->
<div class="container">
  <!-- 페이지 헤더 -->
  <div class="page-header no-print">
    <div>
      <h1>📦 시약 목록</h1>
      <p>조회 기간 내 신청된 시약을 다양한 기준으로 정렬하여 조회합니다</p>
    </div>
    <div class="header-actions">
      <a href="#" onclick="goToAdmin(); return false;" class="btn btn-secondary">← 관리자 페이지</a>
      <button class="theme-toggle" id="themeToggle" onclick="toggleDarkMode()" title="다크모드 전환">
        <span class="icon-light">☀️</span>
        <span class="icon-dark">🌙</span>
      </button>
    </div>
  </div>

  <!-- 인쇄용 헤더 -->
  <div id="printHeader" style="display:none;">
    <h2 style="text-align:center;margin:0 0 8px;">시약 목록</h2>
    <p style="text-align:center;font-size:12px;color:#666;" id="printInfo"></p>
  </div>

  <!-- 조회 조건 -->
  <div class="controls no-print">
    <!-- 기간 선택 -->
    <div class="control-row">
      <div class="control-group">
        <label>시작일</label>
        <input type="date" id="dateFrom">
      </div>
      <div class="control-group">
        <label>종료일</label>
        <input type="date" id="dateTo">
      </div>
      <div class="control-group">
        <label>빠른 선택</label>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-sm btn-secondary" onclick="setQuickDate('today')">오늘</button>
          <button class="btn btn-sm btn-secondary" onclick="setQuickDate('week')">이번 주</button>
          <button class="btn btn-sm btn-secondary" onclick="setQuickDate('month')">이번 달</button>
        </div>
      </div>
      <div class="control-group">
        <label>승인 상태</label>
        <select id="approvalFilter">
          <option value="approved">승인된 신청만</option>
          <option value="all">전체</option>
          <option value="pending">대기중만</option>
        </select>
      </div>
      <div class="control-group">
        <label>실험·실습실</label>
        <select id="labFilter">
          <option value="">전체</option>
        </select>
      </div>
      <div class="control-group">
        <label>시간(일시)</label>
        <select id="timeFilter">
          <option value="">전체</option>
          <option value="ET">ET</option>
          <option value="EP1">EP1</option>
          <option value="7교시">7교시</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="loadData()">🔍 조회</button>
    </div>

    <!-- 정렬 옵션 -->
    <div class="control-row" style="border-top:1px solid var(--border-color);padding-top:16px;margin-top:8px;">
      <div class="control-group">
        <label>1순위 정렬</label>
        <select id="sort1Key">
          <option value="실험실">실험실</option>
          <option value="시간">시간(ET/EP1/7교시)</option>
          <option value="시약명">시약명(가나다순)</option>
          <option value="상태">상태(고체/액체)</option>
          <option value="날짜">사용일</option>
          <option value="신청건수">신청건수</option>
        </select>
      </div>
      <div class="control-group">
        <label>방향</label>
        <select id="sort1Dir">
          <option value="asc">오름차순</option>
          <option value="desc">내림차순</option>
        </select>
      </div>
      <div class="control-group">
        <label>2순위 정렬</label>
        <select id="sort2Key">
          <option value="">없음</option>
          <option value="실험실">실험실</option>
          <option value="시간">시간(ET/EP1/7교시)</option>
          <option value="시약명" selected>시약명(가나다순)</option>
          <option value="상태">상태(고체/액체)</option>
          <option value="날짜">사용일</option>
          <option value="신청건수">신청건수</option>
        </select>
      </div>
      <div class="control-group">
        <label>방향</label>
        <select id="sort2Dir">
          <option value="asc">오름차순</option>
          <option value="desc">내림차순</option>
        </select>
      </div>
      <div class="control-group">
        <label>3순위 정렬</label>
        <select id="sort3Key">
          <option value="">없음</option>
          <option value="실험실">실험실</option>
          <option value="시간">시간(ET/EP1/7교시)</option>
          <option value="시약명">시약명(가나다순)</option>
          <option value="상태">상태(고체/액체)</option>
          <option value="날짜">사용일</option>
          <option value="신청건수">신청건수</option>
        </select>
      </div>
      <div class="control-group">
        <label>방향</label>
        <select id="sort3Dir">
          <option value="asc">오름차순</option>
          <option value="desc">내림차순</option>
        </select>
      </div>
    </div>

    <!-- 그룹화 및 내보내기 -->
    <div class="control-row" style="border-top:1px solid var(--border-color);padding-top:16px;margin-top:8px;">
      <div class="control-group">
        <label>그룹화 표시</label>
        <select id="groupBy">
          <option value="">그룹 없음 (전체 통합)</option>
          <option value="실험실" selected>실험실별</option>
          <option value="시간">시간별(ET/EP1/7교시)</option>
          <option value="상태">상태별(고체/액체/기체)</option>
          <option value="날짜">날짜별</option>
        </select>
      </div>
      <div style="margin-left:auto;display:flex;gap:8px;">
        <button class="btn btn-success" onclick="printList()">🖨️ 인쇄</button>
        <button class="btn btn-info" onclick="exportCSV()">📊 엑셀 내보내기</button>
      </div>
    </div>
  </div>

  <!-- 통계 요약 -->
  <div class="card no-print" id="summaryCard" style="display:none;">
    <div style="display:flex;gap:24px;flex-wrap:wrap;">
      <div><strong>조회 기간:</strong> <span id="summaryPeriod">-</span></div>
      <div><strong>총 시약 종류:</strong> <span id="summaryCount">0</span>종</div>
      <div><strong>총 신청 건수:</strong> <span id="summaryApps">0</span>건</div>
    </div>
  </div>

  <!-- 결과 영역 -->
  <div class="table-container">
    <div class="table-scroll" id="resultContainer">
      <div class="loading">
        <div class="loading-spinner"></div>
        <span>데이터를 불러오는 중...</span>
      </div>
    </div>
  </div>
</div>
