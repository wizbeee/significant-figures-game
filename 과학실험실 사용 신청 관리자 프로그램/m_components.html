    </button>
  </div>
  <div class="version" aria-hidden="true">v3.2.0 · 2026</div>

<script>
function setActiveNav(viewName) {
  $$('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.view === viewName));
  $$('.menu-item').forEach(el => el.classList.toggle('active', el.dataset.view === viewName));
}
function updatePendingBadge(count) {
  const badge = $('#menu-pending-badge');
  if (badge) { badge.textContent = count; badge.style.display = count > 0 ? '' : 'none'; }
}
</script>
